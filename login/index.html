<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
</head>
<body style="background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="width:300px;">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;" />
    <input id="senha" type="password" placeholder="Senha" style="width:100%; padding:10px; margin-bottom:10px;" />

    <button onclick="login()" style="width:100%; padding:10px;">Entrar</button>

    <p id="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabase = window.supabase.createClient(
      "COLE_AQUI_SUA_URL",
      "COLE_AQUI_SUA_ANON_KEY"
    );

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("senha").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        document.getElementById("msg").innerText = error.message;
        return;
      }

      document.getElementById("msg").innerText = "Login OK";

      // redireciona pro sistema
      window.location.href = "../";
    }
  </script>

</body>
</html>
