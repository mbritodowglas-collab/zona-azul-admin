<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Zona Azul</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 320px;
      padding: 20px;
      background: #020617;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Entrar</h2>

    <input id="email" type="email" placeholder="Seu email" />
    <input id="senha" type="password" placeholder="Sua senha" />

    <button onclick="login()">Entrar</button>

    <p id="msg"></p>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    console.log("Script carregado");

    const supabase = window.supabase.createClient(
      "https://qrwzzgnyzsomugranmnu.supabase.co",
      "sb_publishable_CvVEHAvdmjmT-TlrUybIDQ_BOkIOB1M"
    );

    async function login() {
      alert("Botão funcionando");

      const email = document.getElementById("email").value;
      const password = document.getElementById("senha").value;

      if (!email || !password) {
        alert("Preenche email e senha");
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert("Erro: " + error.message);
        return;
      }

      alert("Login OK");

      window.location.href = "../";
    }
  </script>

</body>
</html>
