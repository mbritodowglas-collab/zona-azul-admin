<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Zona Azul | v2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      width: 320px;
      padding: 20px;
      background: #020617;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    h2 { margin-bottom: 8px; }
    .version {
      font-size: 12px;
      color: #93c5fd;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #msg {
      margin-top: 10px;
      font-size: 14px;
      color: #fda4af;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Entrar</h2>
    <div class="version">versão teste v2</div>

    <form id="login-form">
      <input id="email" type="email" placeholder="Seu email" required />
      <input id="senha" type="password" placeholder="Sua senha" required />
      <button id="login-btn" type="submit">Entrar</button>
    </form>

    <p id="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const msg = document.getElementById("msg");
    const form = document.getElementById("login-form");

    function setMsg(text, ok = false) {
      msg.textContent = text;
      msg.style.color = ok ? "#86efac" : "#fda4af";
    }

    document.addEventListener("DOMContentLoaded", () => {
      setMsg("script carregado");
    });

    const supabase = window.supabase.createClient(
      "https://qrwzzgnyzsomugranmnu.supabase.co",
      "sb_publishable_CvVEHAvdmjmT-TlrUybIDQ_BOkIOB1M"
    );

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMsg("botão respondeu");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("senha").value;

      if (!email || !password) {
        setMsg("Preenche email e senha");
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setMsg("Erro: " + error.message);
        return;
      }

      setMsg("Login OK", true);
      setTimeout(() => {
        window.location.href = "../";
      }, 700);
    });
  </script>
</body>
</html>
