<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona Azul Admin</title>
  <link rel="stylesheet" href="./assets/css/global.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">ZA</div>
        <div>
          <h1>Zona Azul Admin</h1>
          <p>Painel operacional</p>
        </div>
      </div>

      <nav class="nav">
        <a class="active" href="./index.html">Dashboard</a>
        <a href="./leads/">Leads</a>
        <a href="./pre-diagnostico/">Pré-diagnóstico</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2>Dashboard</h2>
          <p>Visão geral do funil do Protocolo Zona Azul.</p>
        </div>
      </div>

      <section class="grid grid-4">
        <article class="stat-card">
          <span class="stat-label">Leads totais</span>
          <strong class="stat-value" id="stat-leads">0</strong>
        </article>

        <article class="stat-card">
          <span class="stat-label">Leads novos</span>
          <strong class="stat-value" id="stat-novos">0</strong>
        </article>

        <article class="stat-card">
          <span class="stat-label">Convertidos</span>
          <strong class="stat-value" id="stat-convertidos">0</strong>
        </article>

        <article class="stat-card">
          <span class="stat-label">Média geral</span>
          <strong class="stat-value" id="stat-media">0.0</strong>
        </article>
      </section>

      <section class="card">
        <div class="card-header">
          <h3>Atalhos</h3>
        </div>
        <div class="card-body">
          <div class="actions">
            <a class="btn" href="./pre-diagnostico/">Abrir pré-diagnóstico</a>
            <a class="btn secondary" href="./leads/">Ver leads</a>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h3>Link público</h3>
        </div>
        <div class="card-body">
          <p class="muted">Use este link para enviar o questionário:</p>
          <div class="code-box" id="public-link-box"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/js/storage.js"></script>
  <script src="./assets/js/calculos.js"></script>
  <script src="./assets/js/dashboard.js"></script>
</body>
</html>
