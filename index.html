<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zona Azul Admin</title>

  <link rel="stylesheet" href="./assets/css/global.css?v=61" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">ZA</div>
        <div>
          <h1>Zona Azul</h1>
          <p>Painel operacional</p>
        </div>
      </div>

      <nav class="nav">
        <a href="./index.html" class="active">Dashboard</a>
        <a href="./pre-diagnostico/">Pré-diagnóstico</a>
        <a href="./clientes/">Clientes</a>
      </nav>
    </aside>

    <main class="main">
      <div class="dashboard-wrap">

        <section class="dashboard-hero">
          <div class="dashboard-hero-left">
            <p class="dashboard-kicker">Painel geral</p>
            <h2 class="dashboard-title">Centro de comando da operação</h2>
            <p class="dashboard-subtitle">
              Acompanhe leads, clientes ativos e o fluxo principal do sistema em um só lugar.
            </p>
          </div>

          <div class="dashboard-hero-right">
            <span class="status-soft">Sistema ativo</span>
            <span class="hero-chip" id="hero-total-clientes">0 clientes</span>
            <span class="hero-chip" id="hero-total-leads">0 leads</span>
          </div>
        </section>

        <section class="metrics-grid">
          <article class="metric-panel">
            <small>Total de leads</small>
            <div class="metric-value" id="stat-leads">0</div>
          </article>

          <article class="metric-panel">
            <small>Leads novos</small>
            <div class="metric-value" id="stat-novos">0</div>
          </article>

          <article class="metric-panel">
            <small>Leads convertidos</small>
            <div class="metric-value" id="stat-convertidos">0</div>
          </article>

          <article class="metric-panel">
            <small>Clientes ativos</small>
            <div class="metric-value" id="stat-clientes">0</div>
          </article>
        </section>

      </div>
    </main>
  </div>

  <!-- 🔒 AUTH / GUARD (ANTES DE TUDO) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase.js?v=2"></script>
  <script src="./assets/js/guard.js?v=1"></script>

  <!-- SISTEMA -->
  <script src="./assets/js/storage.js?v=2"></script>
  <script src="./assets/js/dashboard.js?v=2"></script>

</body>
</html>
