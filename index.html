<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona Azul Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b1020;
      --bg2:#0f1731;
      --panel:rgba(255,255,255,.04);
      --panel2:rgba(255,255,255,.03);
      --line:rgba(255,255,255,.08);
      --text:#ecf1ff;
      --muted:#9aa8cf;
      --primary:#5ea0ff;
      --primary2:#8b74ff;
      --success:#2ecc71;
      --warning:#ffb020;
      --danger:#ff5c7c;
      --shadow:0 14px 34px rgba(0,0,0,.24);
      --radius:20px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
      color:var(--text)
    }
    a{text-decoration:none;color:inherit}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}

    .hidden{display:none!important}
    .muted{color:var(--muted)}
    .center{text-align:center}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

    .app-shell{
      min-height:100vh;
      display:grid;
      grid-template-columns:280px 1fr;
    }
    .sidebar{
      position:sticky;
      top:0;
      height:100vh;
      padding:24px 18px;
      border-right:1px solid var(--line);
      background:rgba(8,12,26,.65);
      backdrop-filter:blur(16px);
    }
    .brand{
      display:flex;align-items:center;gap:12px;
      margin-bottom:26px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.03);
    }
    .brand-badge{
      width:44px;height:44px;border-radius:14px;
      display:grid;place-items:center;
      font-weight:800;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:var(--shadow);
    }
    .brand h1{margin:0;font-size:16px}
    .brand p{margin:3px 0 0;font-size:12px;color:var(--muted)}

    .nav{display:grid;gap:8px}
    .nav a{
      display:flex;justify-content:space-between;align-items:center;
      padding:12px 14px;
      border-radius:14px;
      color:var(--muted);
      border:1px solid transparent;
      transition:.2s ease;
    }
    .nav a:hover,.nav a.active{
      color:var(--text);
      background:rgba(94,160,255,.1);
      border-color:rgba(94,160,255,.16);
    }

    .main{
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }
    .topbar h2{margin:0;font-size:26px}
    .topbar p{margin:4px 0 0;color:var(--muted)}

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      flex-wrap:wrap;
    }
    .panel-header h3{margin:0;font-size:16px}
    .panel-body{padding:20px}

    .grid{display:grid;gap:18px}
    .cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .detail-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}

    .stat-card{
      padding:18px;
      border-radius:18px;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid var(--line);
    }
    .stat-label{font-size:13px;color:var(--muted)}
    .stat-value{margin-top:10px;font-size:30px;font-weight:800}

    .btn{
      border:0;
      border-radius:12px;
      padding:12px 16px;
      font-weight:700;
      color:white;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:var(--shadow);
    }
    .btn.small{padding:9px 12px;font-size:13px}
    .btn.secondary{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
      box-shadow:none;
    }
    .btn.danger{
      background:linear-gradient(135deg,#ff4d6d,#ff7a59);
    }

    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

    .field{display:grid;gap:8px;margin-bottom:14px}
    .field label{font-size:13px;color:var(--muted)}
    .field input,
    .field select,
    .field textarea{
      width:100%;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:12px 14px;
      outline:none;
    }
    .field textarea{min-height:120px;resize:vertical}
    .field small{color:var(--muted)}

    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:900px}
    th,td{
      text-align:left;
      padding:14px 12px;
      border-bottom:1px solid var(--line);
      font-size:14px;
      vertical-align:middle;
    }
    th{color:var(--muted);font-weight:600}

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
    }
    .chip.success{background:rgba(46,204,113,.14);color:#bdf7d2}
    .chip.warning{background:rgba(255,176,32,.14);color:#ffe1a6}
    .chip.danger{background:rgba(255,92,124,.14);color:#ffd2dc}

    .empty{
      padding:26px;
      border-radius:16px;
      border:1px dashed rgba(255,255,255,.14);
      background:rgba(255,255,255,.02);
      color:var(--muted);
      text-align:center;
    }

    .message{
      padding:12px 14px;
      border-radius:12px;
      margin-bottom:14px;
      font-size:14px;
    }
    .message.info{background:rgba(94,160,255,.14);color:#d6e7ff}
    .message.success{background:rgba(46,204,113,.16);color:#cbffe0}
    .message.error{background:rgba(255,92,124,.16);color:#ffd4dd}

    .auth-screen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .auth-card{
      width:100%;
      max-width:460px;
      padding:28px;
      border-radius:24px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .kv{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .kv .item{
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
    }
    .kv .item span{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:12px;
    }
    .kv .item strong{
      display:block;
      font-size:14px;
      line-height:1.4;
    }

    .pre{
      white-space:pre-wrap;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:13px;
      color:#dce4ff;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
    }

    .public-wrap{
      min-height:100vh;
      padding:24px;
      display:grid;
      place-items:center;
    }
    .public-card{
      width:100%;
      max-width:980px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .public-head{
      padding:24px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(135deg,rgba(94,160,255,.12),rgba(139,116,255,.08));
    }
    .public-body{padding:24px}

    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      font-size:12px;
      margin-bottom:12px;
    }

    .radar-wrap{
      display:grid;
      place-items:center;
      padding:12px;
    }
    canvas{
      max-width:100%;
      background:rgba(255,255,255,.02);
      border-radius:16px;
    }

    .two-col{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    @media (max-width:1080px){
      .app-shell{grid-template-columns:1fr}
      .sidebar{
        position:relative;
        height:auto;
        border-right:0;
        border-bottom:1px solid var(--line);
      }
      .cols-4,.cols-3,.cols-2,.detail-grid,.two-col{grid-template-columns:1fr}
      .kv{grid-template-columns:1fr}
    }
  </style>
</head>

    function loadMock() {
      const saved = localStorage.getItem(MOCK_KEY);
      if (!saved) {
        localStorage.setItem(MOCK_KEY, JSON.stringify(defaultMock));
        return structuredClone(defaultMock);
      }
      return JSON.parse(saved);
    }

    function saveMock(db) {
      localStorage.setItem(MOCK_KEY, JSON.stringify(db));
    }

    let mockDb = loadMock();

    function structuredClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function uid(prefix="id") {
      return prefix + "_" + Math.random().toString(36).slice(2, 10);
    }

    /***********************

    let supabase = null;

    function createSupabase() {
      if (
        !SUPABASE_URL || SUPABASE_URL.includes("COLE_AQUI") ||
        !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes("COLE_AQUI")
      ) return null;

      return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function formatDate(value) {
      if (!value) return "—";
      try {
        return new Date(value).toLocaleDateString("pt-BR", { dateStyle: "short" });
      } catch {
        return value;
      }
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getStatusChip(status) {
      const map = {
        "novo": "warning",
        "respondeu pré-diagnóstico": "warning",
        "em análise": "warning",

        "convertido": "success",

        "ativo": "success",
        "finalizado": "danger",
        "aguardando diagnóstico": "warning",
        "em planejamento": "warning",
        "planejado": "warning"
      };
      const cls = map[status] || "";
      return `<span class="chip ${cls}">${status || "—"}</span>`;
    }

    function drawRadar(canvas, scoresObj) {
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      ctx.clearRect(0, 0, width, height);

      const labels = Object.keys(scoresObj || {});
      const values = Object.values(scoresObj || {}).map(v => Number(v || 0));
      if (!labels.length) {
        ctx.fillStyle = "#9aa8cf";
        ctx.font = "14px sans-serif";
        ctx.fillText("Sem dados para o gráfico.", 20, 30);
        return;
      }

      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.min(width, height) * 0.34;
      const maxValue = 10;
      const levels = 5;

      ctx.strokeStyle = "rgba(255,255,255,.08)";
      ctx.fillStyle = "rgba(255,255,255,.05)";
      ctx.lineWidth = 1;

      for (let level = 1; level <= levels; level++) {
        const r = radius * (level / levels);
        ctx.beginPath();
        labels.forEach((_, i) => {
          const angle = (-Math.PI / 2) + (2 * Math.PI * i / labels.length);
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.stroke();
      }

      labels.forEach((label, i) => {
        const angle = (-Math.PI / 2) + (2 * Math.PI * i / labels.length);
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);
        ctx.stroke();

        const lx = cx + Math.cos(angle) * (radius + 28);
        const ly = cy + Math.sin(angle) * (radius + 28);
        ctx.fillStyle = "#dfe8ff";
        ctx.font = "12px sans-serif";
        ctx.textAlign = lx < cx - 10 ? "right" : lx > cx + 10 ? "left" : "center";
        ctx.textBaseline = ly < cy ? "bottom" : "top";
        ctx.fillText(label, lx, ly);
      });

      ctx.beginPath();
      labels.forEach((_, i) => {
        const angle = (-Math.PI / 2) + (2 * Math.PI * i / labels.length);
        const val = values[i] / maxValue;
        const x = cx + Math.cos(angle) * radius * val;
        const y = cy + Math.sin(angle) * radius * val;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = "rgba(94,160,255,.25)";
      ctx.strokeStyle = "rgba(94,160,255,.95)";
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();

      labels.forEach((_, i) => {
        const angle = (-Math.PI / 2) + (2 * Math.PI * i / labels.length);
        const val = values[i] / maxValue;
        const x = cx + Math.cos(angle) * radius * val;
        const y = cy + Math.sin(angle) * radius * val;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = "#8ec5ff";
        ctx.fill();
      });
    }

    /***********************
     * DATA ACCESS
     ***********************/
    async function getSessionInfo() {
      if (USE_MOCK) return mockDb.auth.user;
      const { data: { session } } = await supabase.auth.getSession();
      return session?.user || null;
    }

    async function signIn(email, password) {
      if (USE_MOCK) {
        session = { user: mockDb.auth.user };
        return { ok: true };
      }
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return { ok: false, error };
      return { ok: true };
    }

    async function signOut() {
      if (USE_MOCK) {
        session = null;
        location.hash = "#login";
        return;
      }
      await supabase.auth.signOut();
      location.hash = "#login";
    }

    async function listLeads() {
      if (USE_MOCK) return structuredClone(mockDb.leads).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      const { data = [] } = await supabase.from("leads").select("*").order("created_at", { ascending: false });
      return data;
    }

    async function getLead(id) {
      if (USE_MOCK) return structuredClone(mockDb.leads.find(x => x.id === id) || null);
      const { data } = await supabase.from("leads").select("*").eq("id", id).single();
      return data;
    }

    async function getPreByLead(leadId) {
      if (USE_MOCK) {
        return structuredClone(
          mockDb.pre_diagnosticos
            .filter(x => x.lead_id === leadId)
            .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))[0] || null
        );
      }
      const { data } = await supabase
        .from("pre_diagnosticos")
        .select("*")
        .eq("lead_id", leadId)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();
      return data;
    }

    async function updateLead(id, payload) {
      if (USE_MOCK) {
        const idx = mockDb.leads.findIndex(x => x.id === id);
        if (idx >= 0) {
          mockDb.leads[idx] = { ...mockDb.leads[idx], ...payload, updated_at: new Date().toISOString() };
          saveMock(mockDb);
        }
        return;
      }
      await supabase.from("leads").update({ ...payload, updated_at: new Date().toISOString() }).eq("id", id);
    }

    async function convertLeadToAluno(id) {
      if (USE_MOCK) {
        const lead = mockDb.leads.find(x => x.id === id);
        if (!lead) throw new Error("Lead não encontrado.");

        const existing = mockDb.alunos.find(x => x.lead_id === id);
        if (existing) return existing.id;

        const aluno = {
          id: uid("a"),
          lead_id: lead.id,
          nome: lead.nome,
          telefone: lead.telefone,
          email: lead.email,
          data_nascimento: lead.data_nascimento,
          profissao: lead.profissao,
          objetivo_principal: lead.objetivo_principal,
          responsavel_id: "u1",
          status: "aguardando diagnóstico",
          observacoes: lead.observacoes_comerciais || "",
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        };
        mockDb.alunos.push(aluno);
        const leadIdx = mockDb.leads.findIndex(x => x.id === id);
        mockDb.leads[leadIdx].status = "convertido";
        mockDb.leads[leadIdx].updated_at = new Date().toISOString();
        saveMock(mockDb);
        return aluno.id;
      }

      const { data: lead } = await supabase.from("leads").select("*").eq("id", id).single();
      const { data: existingAluno } = await supabase.from("alunos").select("id").eq("lead_id", id).maybeSingle();
      if (existingAluno?.id) return existingAluno.id;

      const payload = {
        lead_id: lead.id,
        nome: lead.nome,
        telefone: lead.telefone,
        email: lead.email,
        data_nascimento: lead.data_nascimento,
        profissao: lead.profissao,
        objetivo_principal: lead.objetivo_principal,
        status: "aguardando diagnóstico",
        observacoes: lead.observacoes_comerciais || null,
      };

      const { data: aluno } = await supabase.from("alunos").insert(payload).select("id").single();
      await supabase.from("leads").update({ status: "convertido", updated_at: new Date().toISOString() }).eq("id", id);
      return aluno.id;
    }

    /***********************
     * SHELL ACTIONS
     ***********************/
    function wireShellActions() {
      document.querySelectorAll(".nav a").forEach(link => {
        const route = location.hash.replace("#", "").split("/")[0] || "dashboard";
        if (link.dataset.nav === route) link.classList.add("active");
      });

      document.getElementById("logoutBtn")?.addEventListener("click", signOut);

      document.getElementById("resetMockBtn")?.addEventListener("click", () => {
        if (!USE_MOCK) return;
        if (!confirm("Resetar os dados mock?")) return;
        localStorage.removeItem(MOCK_KEY);
        mockDb = loadMock();
        alert("Mock resetado.");
        location.hash = "#dashboard";
        router();
      });
    }

    /***********************
     * ROUTER
     ***********************/
    async function router() {
      const hash = location.hash || "#login";
      const parts = hash.replace("#", "").split("/");
      const route = parts[0];
      const id = parts[1];

      if (!USE_MOCK) {
        if (!supabase) {
          app.innerHTML = `
            <section class="auth-screen">
              <div class="auth-card">
                <h2>Configuração pendente</h2>
                <p class="muted">Preencha a URL e a anon key do Supabase no topo do arquivo.</p>
              </div>
            </section>
          `;
          return;
        }
      }

      const publicRoutes = ["pre-diagnostico", "relatorio"];
      if (publicRoutes.includes(route)) {
        if (route === "pre-diagnostico") {
          await renderPublicPreDiagnostico(id);
          return;
        }
        if (route === "relatorio") {
          await renderPublicRelatorio(id);
          return;
        }
      }

      const currentUser = await getSessionInfo();
      session = currentUser ? { user: currentUser } : null;

      if (!session && route !== "login") {
        renderLogin();
        return;
      }

      switch (route) {
        case "":
        case "login":
          renderLogin();
          break;
        case "dashboard":
          await renderDashboard();
          break;
        case "leads":
          await renderLeads();
          break;
        case "lead":
          await renderLeadDetail(id);
          break;
        case "alunos":
          await renderAlunos();
          break;
        case "aluno":
          await renderAlunoDetail(id);
          break;
        default:
          location.hash = "#dashboard";
          await renderDashboard();
      }
    }

    /***********************
     * BOOT
     ***********************/
    const app = document.getElementById("app");
    if (!USE_MOCK) supabase = createSupabase();

    window.addEventListener("hashchange", router);
    window.addEventListener("load", async () => {
      if (!USE_MOCK && supabase) {
        supabase.auth.onAuthStateChange(() => router());
      }
      await router();
    });
  </script>
