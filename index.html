<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackion System</title>
  <link rel="stylesheet" href="./assets/css/global.css?v=1" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-0: #020816;
      --bg-1: #061126;
      --panel: rgba(10, 24, 48, 0.78);
      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);
      --text: #f3f8ff;
      --muted: #9cb0cb;
      --muted-2: #7f92ad;
      --blue-1: #47b8ff;
      --blue-2: #1f7cff;
      --green-1: #7cff5a;
      --shadow-xl: 0 24px 60px rgba(0,0,0,0.35);
      --shadow-lg: 0 18px 42px rgba(0,0,0,0.28);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71,184,255,0.16), transparent 22%),
        radial-gradient(circle at top right, rgba(124,255,90,0.12), transparent 18%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      overflow-x: hidden;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-lg);
      margin-bottom: 26px;
    }

    .brand-badge {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      box-shadow: 0 14px 28px rgba(31,124,255,0.22);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      color: #ffffff;
    }

    .brand-highlight {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #47b8ff, #7cff5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav a {
      min-height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      border-radius: 16px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 700;
      border: 1px solid transparent;
    }

    .nav a.active,
    .nav a:hover {
      color: #ffffff;
      background: rgba(255,255,255,0.04);
      border-color: var(--line);
    }

    .sidebar-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line-soft);
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: #ffffff;
      border: 1px solid var(--line);
    }

    .btn.logout {
      width: 100%;
      background: rgba(255,255,255,0.05);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .main {
      padding: 24px;
      min-width: 0;
    }

    .topbar h2 {
      margin: 0;
      font-size: 38px;
      color: #ffffff;
    }

    .topbar p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .hero {
      margin-top: 20px;
      padding: 28px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(71,184,255,0.16), rgba(124,255,90,0.08)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-xl);
    }

    @media (max-width: 1180px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">TR</div>
        <div>
          <h1>Trackion System</h1>
          <span class="brand-highlight">CORPO • MENTE • PERFORMANCE</span>
        </div>
      </div>

      <nav class="nav">
        <a class="active" href="./index.html">Dashboard</a>
        <a href="./pre-diagnostico/">Pré-diagnóstico</a>
        <a href="./clientes/">Clientes</a>
      </nav>

      <div class="sidebar-footer">
        <button id="logout-btn-sidebar" class="btn logout" type="button">Sair</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h2>Dashboard</h2>
        <p>Centro de comando da operação.</p>
      </div>

      <section class="hero">
        Conteúdo do dashboard aqui.
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase.js?v=2"></script>
  <script src="./assets/js/guard.js?v=1"></script>
  <script src="./assets/js/storage.js?v=2"></script>
  <script src="./assets/js/logout.js?v=1"></script>
</body>
</html>
