<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zona Azul Admin</title>

  <link rel="stylesheet" href="./assets/css/global.css" />
</head>

<body>
  <main class="container">
    <h1>Painel Zona Azul</h1>

    <div class="stats">
      <div class="card">
        <h3>Total Leads</h3>
        <p id="stat-leads">0</p>
      </div>

      <div class="card">
        <h3>Novos</h3>
        <p id="stat-novos">0</p>
      </div>

      <div class="card">
        <h3>Convertidos</h3>
        <p id="stat-convertidos">0</p>
      </div>

      <div class="card">
        <h3>Clientes Ativos</h3>
        <p id="stat-clientes">0</p>
      </div>
    </div>

    <div class="links">
      <a href="./pre-diagnostico/">Pré-diagnóstico</a>
      <a href="./clientes/">Clientes</a>
    </div>

    <div class="public-link">
      <strong>Link público:</strong>
      <div id="public-link-box"></div>
    </div>
  </main>

  <!-- CORE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase.js?v=1"></script>
  <script src="./assets/js/storage.js?v=1"></script>

  <!-- PAGE -->
  <script src="./assets/js/dashboard.js?v=1"></script>
</body>
</html>
