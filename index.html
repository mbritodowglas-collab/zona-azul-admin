<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona Azul Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121936;
      --panel-2: #1a2347;
      --line: #28325f;
      --text: #e8ecff;
      --muted: #9aa6d1;
      --primary: #5ea0ff;
      --primary-2: #7bb3ff;
      --success: #28c76f;
      --warning: #ffb020;
      --danger: #ff5c7c;
      --chip: #1e2a56;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1330 100%);
      color: var(--text);
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      border-right: 1px solid rgba(255,255,255,.06);
      background: rgba(10,16,32,.55);
      backdrop-filter: blur(14px);
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #9f78ff);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    .brand h1 { margin: 0; font-size: 16px; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }

    .nav { display: grid; gap: 8px; }

    .nav a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      color: var(--muted);
      transition: .2s ease;
      border: 1px solid transparent;
    }

    .nav a:hover,
    .nav a.active {
      background: rgba(94,160,255,.10);
      color: var(--text);
      border-color: rgba(94,160,255,.20);
    }

    .main {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .topbar h2 { margin: 0; font-size: 24px; }
    .topbar p { margin: 4px 0 0; color: var(--muted); }

    .panel {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-header h3 { margin: 0; font-size: 16px; }
    .panel-body { padding: 20px; }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .stat-card {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.06);
    }

    .stat-label { color: var(--muted); font-size: 13px; }
    .stat-value { margin-top: 10px; font-size: 30px; font-weight: 800; }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      background: linear-gradient(135deg, var(--primary), #8f75ff);
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .btn.secondary {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      box-shadow: none;
    }

    .btn.danger {
      background: linear-gradient(135deg, #ff4d6d, #ff7a59);
    }

    .btn.small { padding: 9px 12px; font-size: 13px; }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field label { color: var(--muted); font-size: 13px; }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .table-wrap { overflow: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th { color: var(--muted); font-weight: 600; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: var(--chip);
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.06);
    }

    .chip.success { color: #bcffd9; background: rgba(40,199,111,.14); }
    .chip.warning { color: #ffe1a6; background: rgba(255,176,32,.14); }
    .chip.danger { color: #ffd2dc; background: rgba(255,92,124,.14); }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.12);
      border-radius: 16px;
      background: rgba(255,255,255,.02);
    }

    .auth-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .auth-card h2 { margin: 0 0 8px; }
    .auth-card p { margin: 0 0 22px; color: var(--muted); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
    }

    .kv {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .kv .item {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
    }

    .kv .item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .kv .item strong {
      display: block;
      font-size: 14px;
      line-height: 1.4;
    }

    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    .message {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .message.success { background: rgba(40,199,111,.16); color: #caffde; }
    .message.error { background: rgba(255,92,124,.16); color: #ffd2dc; }

    .pre {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      color: #dce4ff;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 14px;
    }

    @media (max-width: 1080px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.06);
      }
      .grid.cols-4, .grid.cols-3, .grid.cols-2, .detail-grid { grid-template-columns: 1fr; }
      .kv { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const SUPABASE_URL = "COLE_AQUI_SUA_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "COLE_AQUI_SUA_SUPABASE_ANON_KEY";

    let supabase = null;
    let session = null;

    function createSupabase() {
      if (
        !SUPABASE_URL || SUPABASE_URL.includes("COLE_AQUI") ||
        !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes("COLE_AQUI")
      ) {
        return null;
      }
      return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function formatDate(value) {
      if (!value) return "—";
      try {
        return new Date(value).toLocaleDateString("pt-BR", { dateStyle: "short" });
      } catch {
        return value;
      }
    }

    function getStatusChip(status) {
      const map = {
        "novo": "warning",
        "respondeu pré-diagnóstico": "warning",
        "em análise": "warning",
        "proposta enviada": "warning",
        "convertido": "success",
        "não convertido": "danger",
        "ativo": "success",
        "finalizado": "danger",
        "aguardando diagnóstico": "warning",
        "em planejamento": "warning",
      };
      const cls = map[status] || "";
      return `<span class="chip ${cls}">${status || "—"}</span>`;
    }

    function showMessage(type, text) {
      return `<div class="message ${type}">${text}</div>`;
    }

    function appShell(title, subtitle, content, actions = "") {
      return `
        <div class="app-shell">
          <aside class="sidebar">
            <div class="brand">
              <div class="brand-badge">ZA</div>
              <div>
                <h1>Zona Azul Admin</h1>
                <p>Operação interna do protocolo</p>
              </div>
            </div>

            <nav class="nav">
              <a href="#dashboard" data-nav="dashboard">Dashboard <span>→</span></a>
              <a href="#leads" data-nav="leads">Leads <span>→</span></a>
              <a href="#alunos" data-nav="alunos">Alunos <span>→</span></a>
            </nav>

            <div style="margin-top: 24px; display: grid; gap: 10px;">
              <button class="btn secondary" id="logoutBtn">Sair</button>
            </div>
          </aside>

          <main class="main">
            <div class="topbar">
              <div>
                <h2>${title}</h2>
                <p>${subtitle}</p>
              </div>
              <div class="row">${actions}</div>
            </div>
            ${content}
          </main>
        </div>
      `;
    }

    function renderLogin() {
      app.innerHTML = `
        <section class="auth-screen">
          <div class="auth-card">
            <div class="brand" style="margin-bottom: 20px;">
              <div class="brand-badge">ZA</div>
              <div>
                <h1>Zona Azul Admin</h1>
                <p>Entrar no painel administrativo</p>
              </div>
            </div>
            <h2>Login</h2>
            <p>Use o e-mail e a senha cadastrados no Supabase Auth.</p>
            ${!supabase ? showMessage('error', 'Preencha sua SUPABASE_URL e SUPABASE_ANON_KEY no topo do arquivo antes de continuar.') : ''}
            <form id="loginForm">
              <div class="field">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="voce@exemplo.com" required />
              </div>
              <div class="field">
                <label for="password">Senha</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required />
              </div>
              <button class="btn" type="submit" ${!supabase ? 'disabled' : ''}>Entrar</button>
            </form>
          </div>
        </section>
      `;

      const form = document.getElementById("loginForm");
      if (!form || !supabase) return;

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const email = form.email.value.trim();
        const password = form.password.value;
        try {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          location.hash = "#dashboard";
        } catch (err) {
          alert("Erro no login: " + err.message);
        }
      });
    }

    async function renderDashboard() {
      const metrics = { leads: 0, leadsAnalise: 0, alunos: 0, relatorios: 0 };

      try {
        const [
          { count: leadsCount },
          { count: analiseCount },
          { count: alunosCount },
          { count: relCount }
        ] = await Promise.all([
          supabase.from("leads").select("id", { count: "exact", head: true }),
          supabase.from("leads").select("id", { count: "exact", head: true }).eq("status", "em análise"),
          supabase.from("alunos").select("id", { count: "exact", head: true }),
          supabase.from("relatorios").select("id", { count: "exact", head: true }),
        ]);

        metrics.leads = leadsCount || 0;
        metrics.leadsAnalise = analiseCount || 0;
        metrics.alunos = alunosCount || 0;
        metrics.relatorios = relCount || 0;
      } catch (err) {
        console.error(err);
      }

      const { data: recentLeads = [] } = await supabase
        .from("leads")
        .select("id, nome, email, telefone, status, created_at")
        .order("created_at", { ascending: false })
        .limit(8);

      app.innerHTML = appShell(
        "Dashboard",
        "Visão geral do pipeline operacional do Zona Azul.",
        `
          <section class="grid cols-4">
            <article class="stat-card"><div class="stat-label">Leads</div><div class="stat-value">${metrics.leads}</div></article>
            <article class="stat-card"><div class="stat-label">Leads em análise</div><div class="stat-value">${metrics.leadsAnalise}</div></article>
            <article class="stat-card"><div class="stat-label">Alunos</div><div class="stat-value">${metrics.alunos}</div></article>
            <article class="stat-card"><div class="stat-label">Relatórios</div><div class="stat-value">${metrics.relatorios}</div></article>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h3>Últimos leads</h3>
              <a class="btn secondary small" href="#leads">Ver todos</a>
            </div>
            <div class="panel-body">
              ${recentLeads.length ? `
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Status</th>
                        <th>Data</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      ${recentLeads.map(lead => `
                        <tr>
                          <td>${lead.nome || '—'}</td>
                          <td>${lead.email || '—'}</td>
                          <td>${lead.telefone || '—'}</td>
                          <td>${getStatusChip(lead.status)}</td>
                          <td>${formatDate(lead.created_at)}</td>
                          <td><button class="btn secondary small" data-open-lead="${lead.id}">Abrir</button></td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              ` : `<div class="empty">Nenhum lead encontrado ainda. O bicho ainda está em silêncio estratégico.</div>`}
            </div>
          </section>
        `,
        `<a class="btn" href="#leads">Ir para leads</a>`
      );

      wireShellActions();
      document.querySelectorAll("[data-open-lead]").forEach(btn => {
        btn.addEventListener("click", () => {
          location.hash = `#lead/${btn.dataset.openLead}`;
        });
      });
    }

    async function renderLeads() {
      const { data: leads = [], error } = await supabase
        .from("leads")
        .select("id, nome, telefone, email, objetivo_principal, status, created_at")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
      }

      app.innerHTML = appShell(
        "Leads",
        "Interessados que responderam o pré-diagnóstico e aguardam análise ou conversão.",
        `
          <section class="panel">
            <div class="panel-header">
              <h3>Lista de leads</h3>
              <button class="btn secondary small" id="refreshLeadsBtn">Atualizar</button>
            </div>
            <div class="panel-body">
              ${leads.length ? `
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Nome</th>
                        <th>Objetivo</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                        <th>Status</th>
                        <th>Entrada</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      ${leads.map(lead => `
                        <tr>
                          <td>${lead.nome || '—'}</td>
                          <td>${lead.objetivo_principal || '—'}</td>
                          <td>${lead.telefone || '—'}</td>
                          <td>${lead.email || '—'}</td>
                          <td>${getStatusChip(lead.status)}</td>
                          <td>${formatDate(lead.created_at)}</td>
                          <td>
                            <button class="btn secondary small" data-open-lead="${lead.id}">Detalhes</button>
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              ` : `<div class="empty">Nenhum lead no banco. Quando o pré-diagnóstico começar a pingar, eles aparecem aqui.</div>`}
            </div>
          </section>
        `,
        ``
      );

      wireShellActions();
      document.getElementById("refreshLeadsBtn")?.addEventListener("click", () => renderLeads());
      document.querySelectorAll("[data-open-lead]").forEach(btn => {
        btn.addEventListener("click", () => {
          location.hash = `#lead/${btn.dataset.openLead}`;
        });
      });
    }

    async function renderLeadDetail(id) {
      const [{ data: lead, error: leadError }, { data: pre }] = await Promise.all([
        supabase.from("leads").select("*").eq("id", id).single(),
        supabase.from("pre_diagnosticos").select("*").eq("lead_id", id).order("created_at", { ascending: false }).limit(1).maybeSingle(),
      ]);

      if (leadError || !lead) {
        app.innerHTML = appShell(
          "Lead não encontrado",
          "Esse registro não apareceu no banco. Fantasma operacional detectado.",
          `<section class="panel"><div class="panel-body"><div class="empty">Lead não encontrado.</div></div></section>`
        );
        wireShellActions();
        return;
      }

      const respostasJson = pre?.respostas_json ? JSON.stringify(pre.respostas_json, null, 2) : "Sem respostas registradas ainda.";
      const pontuacoesJson = pre?.pontuacoes_json ? JSON.stringify(pre.pontuacoes_json, null, 2) : "Sem pontuações calculadas ainda.";

      app.innerHTML = appShell(
        lead.nome || "Lead",
        "Visão detalhada da triagem e preparação para conversão em aluno.",
        `
          <section class="detail-grid">
            <div class="panel">
              <div class="panel-header">
                <h3>Dados do lead</h3>
                <div class="row">
                  <button class="btn secondary small" id="backToLeadsBtn">Voltar</button>
                  <button class="btn small" id="convertLeadBtn">Converter em aluno</button>
                </div>
              </div>
              <div class="panel-body">
                <div class="kv">
                  <div class="item"><span>Nome</span><strong>${lead.nome || '—'}</strong></div>
                  <div class="item"><span>Status</span><strong>${lead.status || '—'}</strong></div>
                  <div class="item"><span>E-mail</span><strong>${lead.email || '—'}</strong></div>
                  <div class="item"><span>Telefone</span><strong>${lead.telefone || '—'}</strong></div>
                  <div class="item"><span>Data de nascimento</span><strong>${lead.data_nascimento || '—'}</strong></div>
                  <div class="item"><span>Profissão</span><strong>${lead.profissao || '—'}</strong></div>
                  <div class="item"><span>Objetivo principal</span><strong>${lead.objetivo_principal || '—'}</strong></div>
                  <div class="item"><span>Criado em</span><strong>${formatDate(lead.created_at)}</strong></div>
                </div>

                <div class="field" style="margin-top: 18px;">
                  <label>Observações comerciais</label>
                  <textarea id="leadObsInput" placeholder="Ex.: lead engajado, pediu retorno na sexta, quer começar logo...">${lead.observacoes_comerciais || ''}</textarea>
                </div>

                <div class="field">
                  <label>Status</label>
                  <select id="leadStatusInput">
                    ${['novo', 'respondeu pré-diagnóstico', 'em análise', 'proposta enviada', 'convertido', 'não convertido'].map(status => `<option value="${status}" ${lead.status === status ? 'selected' : ''}>${status}</option>`).join('')}
                  </select>
                </div>

                <div class="row">
                  <button class="btn secondary" id="saveLeadBtn">Salvar lead</button>
                </div>
              </div>
            </div>

            <div class="panel">
              <div class="panel-header">
                <h3>Pré-diagnóstico</h3>
              </div>
              <div class="panel-body">
                <p class="muted">Resposta mais recente vinculada ao lead.</p>
                <div class="field">
                  <label>Pontuações</label>
                  <div class="pre">${pontuacoesJson}</div>
                </div>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h3>Respostas do pré-diagnóstico</h3>
            </div>
            <div class="panel-body">
              <div class="pre">${respostasJson}</div>
            </div>
          </section>
        `,
      );

      wireShellActions();
      document.getElementById("backToLeadsBtn")?.addEventListener("click", () => location.hash = "#leads");
      document.getElementById("saveLeadBtn")?.addEventListener("click", () => saveLead(id));
      document.getElementById("convertLeadBtn")?.addEventListener("click", () => convertLead(id));
    }

    async function saveLead(id) {
      const status = document.getElementById("leadStatusInput")?.value;
      const observacoes = document.getElementById("leadObsInput")?.value;
      try {
        const { error } = await supabase.from("leads").update({
          status,
          observacoes_comerciais: observacoes,
          updated_at: new Date().toISOString(),
        }).eq("id", id);

        if (error) throw error;
        alert("Lead atualizado.");
        renderLeadDetail(id);
      } catch (err) {
        alert("Erro ao salvar lead: " + err.message);
      }
    }

    async function convertLead(id) {
      if (!confirm("Converter este lead em aluno?")) return;

      try {
        const { data: lead, error: leadError } = await supabase.from("leads").select("*").eq("id", id).single();
        if (leadError || !lead) throw leadError || new Error("Lead não encontrado.");

        const { data: existingAluno } = await supabase.from("alunos").select("id").eq("lead_id", id).maybeSingle();
        if (existingAluno?.id) {
          alert("Esse lead já foi convertido em aluno.");
          location.hash = `#aluno/${existingAluno.id}`;
          return;
        }

        const payload = {
          lead_id: lead.id,
          nome: lead.nome,
          telefone: lead.telefone,
          email: lead.email,
          data_nascimento: lead.data_nascimento,
          profissao: lead.profissao,
          objetivo_principal: lead.objetivo_principal,
          status: "aguardando diagnóstico",
          observacoes: lead.observacoes_comerciais || null,
        };

        const { data: aluno, error: alunoError } = await supabase.from("alunos").insert(payload).select("id").single();
        if (alunoError) throw alunoError;

        const { error: updateLeadError } = await supabase.from("leads").update({
          status: "convertido",
          updated_at: new Date().toISOString(),
        }).eq("id", id);

        if (updateLeadError) throw updateLeadError;

        alert("Lead convertido em aluno.");
        location.hash = `#aluno/${aluno.id}`;
      } catch (err) {
        alert("Erro ao converter lead: " + err.message);
      }
    }

    async function renderAlunos() {
      const { data: alunos = [], error } = await supabase
        .from("alunos")
        .select("id, nome, email, telefone, objetivo_principal, status, created_at")
        .order("created_at", { ascending: false });

      if (error) console.error(error);

      app.innerHTML = appShell(
        "Alunos",
        "Base ativa do protocolo. Aqui o lead vira operação de verdade.",
        `
          <section class="panel">
            <div class="panel-header">
              <h3>Lista de alunos</h3>
            </div>
            <div class="panel-body">
              ${alunos.length ? `
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Nome</th>
                        <th>Objetivo</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                        <th>Status</th>
                        <th>Entrada</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      ${alunos.map(aluno => `
                        <tr>
                          <td>${aluno.nome || '—'}</td>
                          <td>${aluno.objetivo_principal || '—'}</td>
                          <td>${aluno.telefone || '—'}</td>
                          <td>${aluno.email || '—'}</td>
                          <td>${getStatusChip(aluno.status)}</td>
                          <td>${formatDate(aluno.created_at)}</td>
                          <td><button class="btn secondary small" data-open-aluno="${aluno.id}">Abrir</button></td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              ` : `<div class="empty">Nenhum aluno cadastrado ainda.</div>`}
            </div>
          </section>
        `
      );

      wireShellActions();
      document.querySelectorAll("[data-open-aluno]").forEach(btn => {
        btn.addEventListener("click", () => {
          location.hash = `#aluno/${btn.dataset.openAluno}`;
        });
      });
    }

    async function renderAlunoDetail(id) {
      const [alunoRes, diagRes, planRes, periodRes] = await Promise.all([
        supabase.from("alunos").select("*").eq("id", id).single(),
        supabase.from("diagnosticos").select("*").eq("aluno_id", id).order("created_at", { ascending: false }).limit(1).maybeSingle(),
        supabase.from("planejamentos").select("*").eq("aluno_id", id).order("created_at", { ascending: false }).limit(1).maybeSingle(),
        supabase.from("periodizacoes").select("*").eq("aluno_id", id).order("ordem_ciclo", { ascending: true }),
      ]);

      if (alunoRes.error || !alunoRes.data) {
        app.innerHTML = appShell(
          "Aluno não encontrado",
          "Não achei esse registro no banco.",
          `<section class="panel"><div class="panel-body"><div class="empty">Aluno não encontrado.</div></div></section>`
        );
        wireShellActions();
        return;
      }

      const aluno = alunoRes.data;
      const diagnostico = diagRes.data;
      const planejamento = planRes.data;
      const periodizacoes = periodRes.data || [];

      app.innerHTML = appShell(
        aluno.nome || "Aluno",
        "Centro operacional do caso: diagnóstico, planejamento e periodização.",
        `
          <section class="detail-grid">
            <div class="panel">
              <div class="panel-header">
                <h3>Resumo do aluno</h3>
                <button class="btn secondary small" id="backToAlunosBtn">Voltar</button>
              </div>
              <div class="panel-body">
                <div class="kv">
                  <div class="item"><span>Nome</span><strong>${aluno.nome || '—'}</strong></div>
                  <div class="item"><span>Status</span><strong>${aluno.status || '—'}</strong></div>
                  <div class="item"><span>E-mail</span><strong>${aluno.email || '—'}</strong></div>
                  <div class="item"><span>Telefone</span><strong>${aluno.telefone || '—'}</strong></div>
                  <div class="item"><span>Profissão</span><strong>${aluno.profissao || '—'}</strong></div>
                  <div class="item"><span>Objetivo principal</span><strong>${aluno.objetivo_principal || '—'}</strong></div>
                </div>

                <div class="field" style="margin-top: 18px;">
                  <label>Observações</label>
                  <textarea id="alunoObsInput">${aluno.observacoes || ''}</textarea>
                </div>

                <div class="field">
                  <label>Status</label>
                  <select id="alunoStatusInput">
                    ${['aguardando diagnóstico', 'em planejamento', 'ativo', 'finalizado'].map(status => `<option value="${status}" ${aluno.status === status ? 'selected' : ''}>${status}</option>`).join('')}
                  </select>
                </div>

                <div class="row">
                  <button class="btn secondary" id="saveAlunoBtn">Salvar aluno</button>
                </div>
              </div>
            </div>

            <div class="panel">
              <div class="panel-header">
                <h3>Status técnico</h3>
              </div>
              <div class="panel-body">
                <div class="kv">
                  <div class="item"><span>Diagnóstico</span><strong>${diagnostico ? 'Preenchido' : 'Pendente'}</strong></div>
                  <div class="item"><span>Planejamento</span><strong>${planejamento ? 'Preenchido' : 'Pendente'}</strong></div>
                  <div class="item"><span>Periodizações</span><strong>${periodizacoes.length}</strong></div>
                  <div class="item"><span>Entrada</span><strong>${formatDate(aluno.created_at)}</strong></div>
                </div>
              </div>
            </div>
          </section>

          <section class="grid cols-3">
            <div class="panel">
              <div class="panel-header">
                <h3>Diagnóstico</h3>
              </div>
              <div class="panel-body">
                <div class="field">
                  <label>Resumo técnico</label>
                  <textarea id="diagResumoInput" placeholder="Leitura técnica do caso...">${diagnostico?.resumo_tecnico || ''}</textarea>
                </div>
                <div class="field">
                  <label>Conduta inicial</label>
                  <textarea id="diagCondutaInput" placeholder="Conduta inicial...">${diagnostico?.conduta_inicial || ''}</textarea>
                </div>
                <button class="btn secondary" id="saveDiagnosticoBtn">Salvar diagnóstico</button>
              </div>
            </div>

            <div class="panel">
              <div class="panel-header">
                <h3>Planejamento</h3>
              </div>
              <div class="panel-body">
                <div class="field">
                  <label>Objetivo central</label>
                  <input id="planObjetivoInput" value="${planejamento?.objetivo_central || ''}" placeholder="Ex.: emagrecimento com consistência" />
                </div>
                <div class="field">
                  <label>Direção comportamental</label>
                  <textarea id="planComportamentalInput" placeholder="Direção comportamental...">${planejamento?.direcao_comportamental || ''}</textarea>
                </div>
                <div class="field">
                  <label>Direção física</label>
                  <textarea id="planFisicaInput" placeholder="Direção física...">${planejamento?.direcao_fisica || ''}</textarea>
                </div>
                <button class="btn secondary" id="savePlanejamentoBtn">Salvar planejamento</button>
              </div>
            </div>

            <div class="panel">
              <div class="panel-header">
                <h3>Nova periodização</h3>
              </div>
              <div class="panel-body">
                <div class="field">
                  <label>Nome do ciclo</label>
                  <input id="periodNomeInput" placeholder="Ex.: Ciclo 1 - Adaptação" />
                </div>
                <div class="field">
                  <label>Duração em semanas</label>
                  <input id="periodDuracaoInput" type="number" min="1" placeholder="4" />
                </div>
                <div class="field">
                  <label>Frequência semanal</label>
                  <input id="periodFrequenciaInput" type="number" min="1" placeholder="3" />
                </div>
                <div class="field">
                  <label>Divisão</label>
                  <input id="periodDivisaoInput" placeholder="AB, ABC, full body..." />
                </div>
                <div class="field">
                  <label>Resumo para MFIT</label>
                  <textarea id="periodResumoMfitInput" placeholder="Resumo operacional para lançar no MFIT..."></textarea>
                </div>
                <button class="btn secondary" id="savePeriodizacaoBtn">Adicionar periodização</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h3>Periodizações cadastradas</h3>
            </div>
            <div class="panel-body">
              ${periodizacoes.length ? `
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Ordem</th>
                        <th>Ciclo</th>
                        <th>Duração</th>
                        <th>Frequência</th>
                        <th>Divisão</th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${periodizacoes.map(item => `
                        <tr>
                          <td>${item.ordem_ciclo || '—'}</td>
                          <td>${item.nome_ciclo || '—'}</td>
                          <td>${item.duracao_semanas || '—'} semanas</td>
                          <td>${item.frequencia_semanal || '—'}x</td>
                          <td>${item.divisao_treino || '—'}</td>
                          <td>${getStatusChip(item.status || 'planejado')}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              ` : `<div class="empty">Nenhuma periodização ainda. Sem problema. Todo império começa sem microciclo.</div>`}
            </div>
          </section>
        `
      );

      wireShellActions();
      document.getElementById("backToAlunosBtn")?.addEventListener("click", () => location.hash = "#alunos");
      document.getElementById("saveAlunoBtn")?.addEventListener("click", () => saveAluno(id));
      document.getElementById("saveDiagnosticoBtn")?.addEventListener("click", () => saveDiagnostico(id, diagnostico?.id));
      document.getElementById("savePlanejamentoBtn")?.addEventListener("click", () => savePlanejamento(id, planejamento?.id));
      document.getElementById("savePeriodizacaoBtn")?.addEventListener("click", () => savePeriodizacao(id, planejamento?.id, periodizacoes.length));
    }

    async function saveAluno(id) {
      const status = document.getElementById("alunoStatusInput")?.value;
      const observacoes = document.getElementById("alunoObsInput")?.value;
      try {
        const { error } = await supabase.from("alunos").update({
          status,
          observacoes,
          updated_at: new Date().toISOString(),
        }).eq("id", id);

        if (error) throw error;
        alert("Aluno atualizado.");
        renderAlunoDetail(id);
      } catch (err) {
        alert("Erro ao salvar aluno: " + err.message);
      }
    }

    async function saveDiagnostico(alunoId, diagnosticoId) {
      const resumo_tecnico = document.getElementById("diagResumoInput")?.value;
      const conduta_inicial = document.getElementById("diagCondutaInput")?.value;

      try {
        if (diagnosticoId) {
          const { error } = await supabase.from("diagnosticos").update({
            resumo_tecnico,
            conduta_inicial,
            updated_at: new Date().toISOString(),
          }).eq("id", diagnosticoId);
          if (error) throw error;
        } else {
          const { error } = await supabase.from("diagnosticos").insert({
            aluno_id: alunoId,
            resumo_tecnico,
            conduta_inicial,
          });
          if (error) throw error;
        }

        await supabase.from("alunos").update({
          status: "em planejamento",
          updated_at: new Date().toISOString()
        }).eq("id", alunoId);

        alert("Diagnóstico salvo.");
        renderAlunoDetail(alunoId);
      } catch (err) {
        alert("Erro ao salvar diagnóstico: " + err.message);
      }
    }

    async function savePlanejamento(alunoId, planejamentoId) {
      const objetivo_central = document.getElementById("planObjetivoInput")?.value;
      const direcao_comportamental = document.getElementById("planComportamentalInput")?.value;
      const direcao_fisica = document.getElementById("planFisicaInput")?.value;

      try {
        if (planejamentoId) {
          const { error } = await supabase.from("planejamentos").update({
            objetivo_central,
            direcao_comportamental,
            direcao_fisica,
            updated_at: new Date().toISOString(),
          }).eq("id", planejamentoId);
          if (error) throw error;
        } else {
          const { error } = await supabase.from("planejamentos").insert({
            aluno_id: alunoId,
            objetivo_central,
            direcao_comportamental,
            direcao_fisica,
            status: "ativo",
          });
          if (error) throw error;
        }

        alert("Planejamento salvo.");
        renderAlunoDetail(alunoId);
      } catch (err) {
        alert("Erro ao salvar planejamento: " + err.message);
      }
    }

    async function savePeriodizacao(alunoId, planejamentoId, currentCount) {
      const nome_ciclo = document.getElementById("periodNomeInput")?.value.trim();
      const duracao_semanas = Number(document.getElementById("periodDuracaoInput")?.value || 0);
      const frequencia_semanal = Number(document.getElementById("periodFrequenciaInput")?.value || 0);
      const divisao_treino = document.getElementById("periodDivisaoInput")?.value.trim();
      const resumo_mfit = document.getElementById("periodResumoMfitInput")?.value.trim();

      if (!nome_ciclo) {
        alert("Informe o nome do ciclo.");
        return;
      }

      try {
        const { error } = await supabase.from("periodizacoes").insert({
          aluno_id: alunoId,
          planejamento_id: planejamentoId || null,
          nome_ciclo,
          ordem_ciclo: currentCount + 1,
          duracao_semanas: duracao_semanas || null,
          frequencia_semanal: frequencia_semanal || null,
          divisao_treino,
          resumo_mfit,
          status: "planejado",
        });

        if (error) throw error;

        await supabase.from("alunos").update({
          status: "ativo",
          updated_at: new Date().toISOString()
        }).eq("id", alunoId);

        alert("Periodização adicionada.");
        renderAlunoDetail(alunoId);
      } catch (err) {
        alert("Erro ao salvar periodização: " + err.message);
      }
    }

    function wireShellActions() {
      document.querySelectorAll(".nav a").forEach(link => {
        const route = location.hash.replace("#", "").split("/")[0] || "dashboard";
        if (link.dataset.nav === route) link.classList.add("active");
      });

      document.getElementById("logoutBtn")?.addEventListener("click", async () => {
        await supabase.auth.signOut();
        location.hash = "#login";
      });
    }

    async function router() {
      const hash = location.hash || "#dashboard";
      const [route, id] = hash.replace("#", "").split("/");

      if (!supabase) {
        renderLogin();
        return;
      }

      const { data: { session: currentSession } } = await supabase.auth.getSession();
      session = currentSession;

      if (!session && route !== "login") {
        location.hash = "#login";
        renderLogin();
        return;
      }

      if (!session) {
        renderLogin();
        return;
      }

      switch (route) {
        case "login":
          location.hash = "#dashboard";
          break;
        case "dashboard":
          await renderDashboard();
          break;
        case "leads":
          await renderLeads();
          break;
        case "lead":
          await renderLeadDetail(id);
          break;
        case "alunos":
          await renderAlunos();
          break;
        case "aluno":
          await renderAlunoDetail(id);
          break;
        default:
          location.hash = "#dashboard";
          await renderDashboard();
      }
    }

    const app = document.getElementById("app");
    supabase = createSupabase();

    window.addEventListener("hashchange", router);
    window.addEventListener("load", async () => {
      if (supabase) {
        supabase.auth.onAuthStateChange(() => router());
      }
      await router();
    });
  </script>
</body>
</html>
