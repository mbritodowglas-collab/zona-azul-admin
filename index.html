<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona Azul Admin</title>
  <link rel="stylesheet" href="./assets/css/global.css?v=1" />

  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(108,124,255,0.16), transparent 22%),
        radial-gradient(circle at top right, rgba(77,163,255,0.12), transparent 20%),
        linear-gradient(180deg, #071120 0%, #050d19 100%);
      color: #fff;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .brand {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand-badge {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: linear-gradient(135deg,#6366f1,#3b82f6);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav a {
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: #9fb0c7;
    }

    .nav a.active {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .main {
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary {
      background: rgba(255,255,255,0.06);
      color: white;
    }

    .hero {
      margin-top: 20px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
    }

    .grid {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    .grid-4 {
      grid-template-columns: repeat(4,1fr);
    }

    .card {
      padding: 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">ZA</div>
        <div>
          <h1>Zona Azul</h1>
          <p>Painel operacional</p>
        </div>
      </div>

      <nav class="nav">
        <a class="active" href="./index.html">Dashboard</a>
        <a href="./pre-diagnostico/">Pré-diagnóstico</a>
        <a href="./clientes/">Clientes</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">
      
      <div class="topbar">
        <div>
          <h2>Dashboard</h2>
          <p>Visão geral da operação</p>
        </div>

        <button id="logout-btn" class="btn secondary">Sair</button>
      </div>

      <section class="hero">
        <h3>Centro de comando</h3>
        <p>Acompanhe seus leads e clientes em tempo real</p>
      </section>

      <section class="grid grid-4">
        <div class="card">
          <span>Leads</span>
          <div class="stat-value" id="stat-leads">0</div>
        </div>

        <div class="card">
          <span>Novos</span>
          <div class="stat-value" id="stat-novos">0</div>
        </div>

        <div class="card">
          <span>Convertidos</span>
          <div class="stat-value" id="stat-convertidos">0</div>
        </div>

        <div class="card">
          <span>Clientes</span>
          <div class="stat-value" id="stat-clientes">0</div>
        </div>
      </section>

    </main>
  </div>

  <!-- CORE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase.js?v=2"></script>

  <!-- 🔒 GUARD -->
  <script src="./assets/js/guard.js?v=1"></script>

  <!-- SISTEMA -->
  <script src="./assets/js/storage.js?v=2"></script>
  <script src="./assets/js/dashboard.js?v=2"></script>

  <!-- LOGOUT -->
  <script src="./assets/js/logout.js?v=1"></script>

</body>
</html>
