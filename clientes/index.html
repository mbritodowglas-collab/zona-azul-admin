<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=60"/>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-0: #020816;
      --bg-1: #061126;
      --panel: rgba(10, 24, 48, 0.78);
      --line: rgba(255,255,255,0.08);
      --text: #f3f8ff;
      --muted: #9cb0cb;
      --blue-1: #47b8ff;
      --blue-2: #1f7cff;
      --green-1: #7cff5a;
      --shadow-lg: 0 18px 42px rgba(0,0,0,0.28);
      --radius-lg: 22px;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71,184,255,0.16), transparent 22%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
    }

    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      padding: 3px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
    }

    .brand-highlight {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue-1), var(--green-1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav a {
      padding: 12px 14px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 700;
    }

    .nav a.active {
      background: rgba(71,184,255,0.1);
      color: #fff;
    }

    .logout-btn {
      margin-top: auto;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: #fff;
      cursor: pointer;
    }

    .main {
      padding: 24px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 32px;
    }

    .clientes-grid {
      margin-top: 20px;
      display: grid;
      gap: 14px;
    }

    .cliente-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--panel);
      border: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cliente-info strong {
      display: block;
      font-size: 16px;
    }

    .cliente-info span {
      color: var(--muted);
      font-size: 13px;
    }

    .cliente-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      color: #fff;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

  </style>
</head>

<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <div class="brand-logo">
        <img src="../assets/img/trackion-logo.png" alt="Trackion System"/>
      </div>
      <div>
        <h1>Trackion System</h1>
        <span class="brand-highlight">CORPO • MENTE • PERFORMANCE</span>
      </div>
    </div>

    <nav class="nav">
      <a href="../index.html">Dashboard</a>
      <a href="../pre-diagnostico/">Pré-diagnóstico</a>
      <a class="active" href="../clientes/">Clientes</a>
    </nav>

    <button id="logout-btn-sidebar" class="logout-btn">Sair</button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h2>Clientes</h2>
      <p style="color:var(--muted)">Base ativa do sistema</p>
    </div>

    <section id="clientes-list" class="clientes-grid"></section>

  </main>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/guard.js"></script>
<script src="../assets/js/storage.js"></script>
<script src="../assets/js/logout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const container = document.getElementById("clientes-list");

  try {
    const { data, error } = await window.ZASupabase.client
      .from("clientes")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) throw error;

    if (!data.length) {
      container.innerHTML = "<p style='color:var(--muted)'>Nenhum cliente encontrado.</p>";
      return;
    }

    data.forEach(cliente => {

      const el = document.createElement("div");
      el.className = "cliente-card";

      el.innerHTML = `
        <div class="cliente-info">
          <strong>${cliente.nome}</strong>
          <span>${cliente.objetivo || "Sem objetivo definido"}</span>
        </div>

        <div class="cliente-actions">
          <button class="btn primary" onclick="abrirCliente('${cliente.id}')">Abrir</button>
          <button class="btn secondary" onclick="abrirRelatorio('${cliente.id}')">Relatório</button>
        </div>
      `;

      container.appendChild(el);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p style='color:red'>Erro ao carregar clientes.</p>";
  }

});

function abrirCliente(id) {
  window.location.href = `../cliente/index.html?id=${id}`;
}

function abrirRelatorio(id) {
  window.location.href = `../cliente/relatorio-cliente.html?id=${id}`;
}
</script>

</body>
</html>
