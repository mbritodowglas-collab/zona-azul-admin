<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório do Cliente | Zona Azul</title>

<link rel="stylesheet" href="../assets/css/global.css?v=54">

<style>

/* ===== BASE ===== */
body {
  background: radial-gradient(circle at top, #111827, #020617 70%);
}

/* ===== LAYOUT ===== */
.report-wrap {
  display: grid;
  gap: 24px;
}

/* ===== HERO ===== */
.report-hero {
  background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(168,85,247,0.15));
  border-radius: 28px;
  padding: 24px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.report-hero-left {
  display: flex;
  gap: 16px;
  align-items: center;
}

.report-avatar {
  width: 70px;
  height: 70px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 22px;
  background: linear-gradient(135deg,#6d73ff,#8d72ff);
}

.report-title {
  font-size: 26px;
  font-weight: 700;
}

.report-sub {
  opacity: 0.7;
}

/* ===== CARD ===== */
.report-card {
  background: rgba(255,255,255,0.03);
  border-radius: 26px;
  overflow: hidden;
}

.report-card-header {
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.report-card-header h3 {
  margin: 0;
}

.report-card-body {
  padding: 20px;
}

/* ===== SUMMARY ===== */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 16px;
}

.summary-box {
  background: rgba(255,255,255,0.04);
  padding: 16px;
  border-radius: 18px;
}

.summary-box h4 {
  font-size: 13px;
  opacity: 0.6;
}

.summary-box p {
  font-weight: bold;
}

/* ===== RADAR ===== */
.radar-canvas-wrap {
  height: 350px;
}

/* ===== MÉTRICAS ===== */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 14px;
}

.metric-card {
  background: rgba(255,255,255,0.04);
  padding: 16px;
  border-radius: 18px;
}

.metric-values {
  display: flex;
  justify-content: space-between;
}

.metric-delta {
  margin-top: 8px;
  font-weight: bold;
}

.delta-positive { color: #22c55e; }
.delta-negative { color: #ef4444; }
.delta-neutral { color: #eab308; }

/* ===== PERIMETRIA ===== */
.perimetria-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 14px;
}

/* ===== DIAGNÓSTICO ===== */
.text-box {
  background: rgba(255,255,255,0.04);
  padding: 16px;
  border-radius: 18px;
}

/* ===== TIMELINE ===== */
.timeline {
  display: grid;
  gap: 10px;
}

.timeline-item {
  background: rgba(255,255,255,0.04);
  padding: 12px;
  border-radius: 14px;
}

/* ===== RESPONSIVO ===== */
@media(max-width:900px){
  .summary-grid { grid-template-columns:1fr; }
  .metrics-grid { grid-template-columns:1fr 1fr; }
  .perimetria-grid { grid-template-columns:1fr 1fr; }
}

@media(max-width:500px){
  .metrics-grid,
  .perimetria-grid {
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="app-shell">
<main class="main">

<div class="report-wrap">

<!-- HERO -->
<section class="report-hero">
  <div class="report-hero-left">
    <div class="report-avatar" id="report-avatar">C</div>
    <div>
      <div class="report-title" id="report-nome">Cliente</div>
      <div class="report-sub" id="report-email"></div>
      <div class="report-sub" id="report-meta"></div>
    </div>
  </div>

  <div>
    <div class="report-sub" id="report-data-geracao"></div>
  </div>
</section>

<!-- RESUMO -->
<section class="report-card">
  <div class="report-card-header">
    <h3>Resumo Estratégico</h3>
  </div>
  <div class="report-card-body">
    <div class="summary-grid">
      <div class="summary-box">
        <h4>Objetivo</h4>
        <p id="summary-objetivo"></p>
      </div>
      <div class="summary-box">
        <h4>Gargalo</h4>
        <p id="summary-gargalo"></p>
      </div>
      <div class="summary-box">
        <h4>Prioridade</h4>
        <p id="summary-prioridade"></p>
      </div>
    </div>
  </div>
</section>

<!-- RADAR -->
<section class="report-card">
  <div class="report-card-header">
    <h3>Radar Comparativo</h3>
  </div>
  <div class="report-card-body">
    <div class="radar-canvas-wrap">
      <canvas id="radar-chart"></canvas>
    </div>
  </div>
</section>

<!-- MÉTRICAS -->
<section class="report-card">
  <div class="report-card-header">
    <h3>Composição Corporal</h3>
  </div>
  <div class="report-card-body">
    <div id="metrics-grid" class="metrics-grid"></div>
  </div>
</section>

<!-- 📈 EVOLUÇÃO -->
<section class="report-card">
  <div class="report-card-header">
    <h3>Evolução dos Indicadores</h3>
  </div>
  <div class="report-card-body">
    <div style="height:350px;">
      <canvas id="evolucao-chart"></canvas>
    </div>
  </div>
</section>

<!-- PERIMETRIA -->
<section class="report-card">
  <div class="report-card-header">
    <h3>Perimetria</h3>
  </div>
  <div class="report-card-body">
    <div id="perimetria-grid" class="perimetria-grid"></div>
  </div>
</section>

<!-- DIAGNÓSTICO -->
<section class="report-card">
  <div class="report-card-header">
    <h3>Leitura Técnica</h3>
  </div>
  <div class="report-card-body summary-grid">
    <div class="text-box">
      <h4>Leitura</h4>
      <p id="diagnostico-leitura"></p>
    </div>
    <div class="text-box">
      <h4>Síntese</h4>
      <p id="diagnostico-sintese"></p>
    </div>
    <div class="text-box">
      <h4>Foco</h4>
      <p id="diagnostico-foco"></p>
    </div>
  </div>
</section>

<!-- TIMELINE -->
<section class="report-card">
  <div class="report-card-header">
    <h3>Acompanhamentos</h3>
  </div>
  <div class="report-card-body">
    <div id="timeline-list" class="timeline"></div>
  </div>
</section>

</div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../assets/js/storage.js?v=52"></script>
<script src="../assets/js/relatorio-cliente.js?v=53"></script>

</body>
</html>
