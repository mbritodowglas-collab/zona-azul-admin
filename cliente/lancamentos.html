<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lançamentos | Trackion System</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=56" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-0: #020816;
      --bg-1: #061126;
      --bg-2: #0a1830;

      --panel: rgba(10, 24, 48, 0.78);
      --panel-2: rgba(12, 26, 52, 0.9);
      --panel-soft: rgba(255,255,255,0.04);

      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);

      --text: #f3f8ff;
      --muted: #9cb0cb;
      --muted-2: #7f92ad;

      --blue-1: #47b8ff;
      --blue-2: #1f7cff;
      --green-1: #7cff5a;

      --shadow-xl: 0 24px 60px rgba(0,0,0,0.35);
      --shadow-lg: 0 18px 42px rgba(0,0,0,0.28);

      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71,184,255,0.16), transparent 22%),
        radial-gradient(circle at top right, rgba(124,255,90,0.10), transparent 18%),
        radial-gradient(circle at 50% 0%, rgba(31,124,255,0.12), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      overflow-x: hidden;
    }

    .main {
      width: 100%;
      padding: 22px;
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .minimal-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0 2px;
    }

    .minimal-topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
      flex-shrink: 0;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.08);
      opacity: 0.98;
    }

    .minimal-kicker {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .minimal-kicker span {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-2);
    }

    .minimal-kicker strong {
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ghost-btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .ghost-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.08);
    }

    .hero-card {
      border-radius: 30px;
      background:
        radial-gradient(circle at top right, rgba(124,255,90,0.08), transparent 18%),
        linear-gradient(135deg, rgba(71,184,255,0.10), rgba(124,255,90,0.04)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(12px);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -40px;
      bottom: -60px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(71,184,255,0.16), transparent 70%);
      filter: blur(8px);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .hero-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      box-shadow: 0 16px 32px rgba(31,124,255,0.24);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .hero-copy {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.02;
      letter-spacing: -0.05em;
      color: #ffffff;
    }

    .hero-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .hero-goal {
      color: #dce9ff !important;
      font-size: 15px !important;
    }

    .hero-side {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .chip {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      color: #edf5ff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.78fr);
      gap: 16px;
      align-items: start;
    }

    .col-main,
    .col-side {
      display: grid;
      gap: 14px;
    }

    .accordion-card {
      border-radius: 24px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .accordion-head {
      padding: 20px 22px;
    }

    .accordion-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }

    .accordion-title-group {
      min-width: 0;
    }

    .accordion-title-group h2 {
      margin: 0;
      color: #ffffff;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .accordion-title-group p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .accordion-icon {
      flex-shrink: 0;
      color: rgba(255,255,255,0.72);
      font-size: 22px;
      transition: transform 0.22s ease;
    }

    .accordion-card.is-open .accordion-icon {
      transform: rotate(180deg);
    }

    .accordion-panel {
      display: none;
      padding: 0 22px 22px;
      border-top: 1px solid var(--line-soft);
    }

    .accordion-card.is-open .accordion-panel {
      display: block;
    }

    .subsection-title {
      margin: 18px 0 14px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #ffffff;
    }

    .divider {
      height: 1px;
      background: var(--line-soft);
      margin: 22px 0;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .cols-1 {
      grid-template-columns: 1fr;
    }

    .cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .field label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--muted-2);
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #ffffff;
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #8ca0bc;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(71,184,255,0.35);
      box-shadow: 0 0 0 3px rgba(71,184,255,0.08);
      background: rgba(255,255,255,0.05);
    }

    .field input[readonly] {
      opacity: 0.9;
    }

    .birth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .section-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .updated-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .btn-primary,
    .btn-secondary {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    .btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      box-shadow: 0 12px 22px rgba(31,124,255,0.18);
    }

    .btn-secondary {
      color: #ffffff;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .action-cluster {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .radar-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .radar-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .radar-card-head {
      margin-bottom: 12px;
    }

    .radar-card-head strong {
      color: #ffffff;
      font-size: 15px;
    }

    .radar-values {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 12px;
      align-items: end;
    }

    .radar-pre {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .radar-pre span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--muted-2);
      font-weight: 900;
    }

    .radar-pre strong {
      font-size: 26px;
      color: #ffffff;
      line-height: 1;
    }

    .radar-revisado {
      display: grid;
      gap: 8px;
    }

    .radar-revisado label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--muted-2);
      font-weight: 900;
    }

    .checkbox-field {
      display: flex;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #e8f2ff;
      font-size: 14px;
      line-height: 1.5;
      cursor: pointer;
    }

    .checkbox-field input {
      width: 18px;
      height: 18px;
      accent-color: #1f7cff;
      flex-shrink: 0;
    }

    .acompanhamentos-lista {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .acomp-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .acomp-item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .acomp-item-top strong {
      color: #ffffff;
      font-size: 14px;
    }

    .acomp-item-top span {
      color: var(--muted);
      font-size: 13px;
    }

    .acomp-item p {
      margin: 6px 0 0;
      color: #d6e4f8;
      font-size: 14px;
      line-height: 1.7;
    }

    .empty-state {
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.10);
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1080px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .main {
        padding: 16px;
      }

      .hero-card {
        padding: 20px;
      }

      .hero-copy h1 {
        font-size: 28px;
      }

      .minimal-topbar {
        align-items: flex-start;
      }

      .top-actions {
        width: 100%;
      }

      .top-actions > * {
        width: 100%;
      }

      .hero-inner,
      .hero-side {
        align-items: flex-start;
      }

      .cols-2,
      .cols-3,
      .birth-grid,
      .radar-grid,
      .radar-values {
        grid-template-columns: 1fr;
      }

      .section-actions {
        align-items: stretch;
      }

      .action-cluster {
        width: 100%;
      }

      .action-cluster > * {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="page-wrap">
      <div class="minimal-topbar">
        <div class="minimal-topbar-left">
          <button id="btn-back" class="back-btn" type="button" aria-label="Voltar">←</button>
          <div class="minimal-kicker">
            <span>Trackion System</span>
            <strong>Lançamentos técnicos</strong>
          </div>
        </div>

        <div class="top-actions">
          <button id="logout-btn" class="ghost-btn" type="button">Sair</button>
        </div>
      </div>

      <div id="cliente-not-found" class="hidden">
        <div class="empty-state">Cliente não encontrado.</div>
      </div>

      <div id="lancamentos-page">
        <section class="hero-card">
          <div class="hero-inner">
            <div class="hero-left">
              <div class="avatar" id="cliente-avatar">C</div>
              <div class="hero-copy">
                <h1 id="cliente-nome">Cliente</h1>
                <p id="cliente-email">email@cliente.com</p>
                <p id="cliente-objetivo" class="hero-goal">Objetivo principal</p>
              </div>
            </div>

            <div class="hero-side">
              <span class="chip" id="cliente-fase-chip">Fase atual</span>
              <span class="chip" id="cliente-status-chip">Registro técnico</span>
            </div>
          </div>
        </section>

        <section class="content-grid">
          <div class="col-main">
            <section class="accordion-card is-open launch-accordion" data-accordion="dados-base">
              <div class="accordion-head">
                <button class="accordion-toggle" type="button" aria-expanded="true">
                  <div class="accordion-title-group">
                    <h2>Base do pré-diagnóstico</h2>
                    <p>Dados herdados e ajustes finos.</p>
                  </div>
                  <span class="accordion-icon">⌄</span>
                </button>
              </div>

              <div class="accordion-panel">
                <div class="grid cols-2" style="margin-top:18px;">
                  <div class="field">
                    <label for="pre-nome-edit">Nome</label>
                    <input id="pre-nome-edit" type="text" />
                  </div>

                  <div class="field">
                    <label for="pre-email-edit">E-mail</label>
                    <input id="pre-email-edit" type="email" />
                  </div>

                  <div class="field">
                    <label for="pre-telefone-edit">Telefone</label>
                    <input id="pre-telefone-edit" type="text" />
                  </div>

                  <div class="field">
                    <label for="pre-sexo-ref">Sexo para cálculo / referência</label>
                    <input id="pre-sexo-ref" type="text" placeholder="Ex.: masculino / feminino" />
                  </div>

                  <div class="field" style="grid-column: 1 / -1;">
                    <label>Data de nascimento</label>
                    <div class="birth-grid">
                      <input id="pre-nascimento-dia" type="number" min="1" max="31" placeholder="Dia" />
                      <select id="pre-nascimento-mes">
                        <option value="">Mês</option>
                        <option value="1">Jan</option>
                        <option value="2">Fev</option>
                        <option value="3">Mar</option>
                        <option value="4">Abr</option>
                        <option value="5">Mai</option>
                        <option value="6">Jun</option>
                        <option value="7">Jul</option>
                        <option value="8">Ago</option>
                        <option value="9">Set</option>
                        <option value="10">Out</option>
                        <option value="11">Nov</option>
                        <option value="12">Dez</option>
                      </select>
                      <input id="pre-nascimento-ano" type="number" min="1900" max="2100" placeholder="Ano" />
                    </div>
                  </div>

                  <div class="field">
                    <label for="pre-idade">Idade</label>
                    <input id="pre-idade" type="text" readonly />
                  </div>

                  <div class="field" style="grid-column: 1 / -1;">
                    <label for="pre-objetivo">Objetivo inicial</label>
                    <textarea id="pre-objetivo"></textarea>
                  </div>

                  <div class="field" style="grid-column: 1 / -1;">
                    <label for="pre-resumo">Resumo do pré-diagnóstico</label>
                    <textarea id="pre-resumo"></textarea>
                  </div>
                </div>

                <div class="section-actions">
                  <span class="updated-label" id="dados-base-updated">Última atualização: —</span>
                  <button class="btn-primary" id="salvar-dados-base-btn" type="button">Salvar dados base</button>
                </div>
              </div>
            </section>

            <section class="accordion-card launch-accordion" data-accordion="sessao-avaliacao">
              <div class="accordion-head">
                <button class="accordion-toggle" type="button" aria-expanded="false">
                  <div class="accordion-title-group">
                    <h2>Sessão e avaliação</h2>
                    <p>Estrutura da sessão, protocolo e avaliação física.</p>
                  </div>
                  <span class="accordion-icon">⌄</span>
                </button>
              </div>

              <div class="accordion-panel">
                <h3 class="subsection-title">Estrutura da sessão</h3>

                <div class="grid cols-3">
                  <div class="field">
                    <label for="sessao-data">Data da sessão</label>
                    <input id="sessao-data" type="date" />
                  </div>

                  <div class="field">
                    <label for="sessao-tipo">Tipo</label>
                    <select id="sessao-tipo">
                      <option value="">Selecionar</option>
                      <option value="online">Online</option>
                      <option value="presencial">Presencial</option>
                    </select>
                  </div>

                  <div class="field">
                    <label for="sessao-protocolo">Protocolo</label>
                    <select id="sessao-protocolo">
                      <option value="">Selecionar</option>
                      <option value="A">A — Online (Marinha)</option>
                      <option value="B
