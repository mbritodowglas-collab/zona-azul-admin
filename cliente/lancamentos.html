<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Avaliação | Trackion</title>

<link rel="stylesheet" href="../assets/css/global.css">

<style>
body {
  background: #061126;
  color: #fff;
  font-family: system-ui;
  margin: 0;
}

.wrap {
  max-width: 900px;
  margin: auto;
  padding: 24px;
}

.card {
  background: rgba(10,24,48,0.9);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 18px;
}

h2 {
  margin-bottom: 10px;
}

.grid {
  display: grid;
  gap: 12px;
}

.grid-2 {
  grid-template-columns: repeat(2,1fr);
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: linear-gradient(135deg,#47b8ff,#1f7cff);
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  width: 100%;
}
</style>
</head>

<body>
<div class="wrap">

<h1>Nova Avaliação</h1>

<!-- CABEÇALHO -->
<div class="card">
<h2>Informações gerais</h2>

<div class="grid">
<input id="titulo" placeholder="Título da avaliação">
<textarea id="resumo" placeholder="Resumo"></textarea>

<select id="fase">
<option value="">Fase</option>
<option>Base</option>
<option>Construção</option>
<option>Ajuste</option>
</select>

<input id="objetivo" placeholder="Objetivo atual">
</div>
</div>

<!-- PILARES -->
<div class="card">
<h2>Pilares (0-10)</h2>

<div class="grid grid-2">
<input id="movimento" type="number" placeholder="Movimento">
<input id="alimentacao" type="number" placeholder="Alimentação">
<input id="sono" type="number" placeholder="Sono">
<input id="proposito" type="number" placeholder="Propósito">
<input id="social" type="number" placeholder="Social">
<input id="estresse" type="number" placeholder="Estresse">
</div>
</div>

<!-- MÉTRICAS -->
<div class="card">
<h2>Métricas</h2>

<div class="grid grid-2">
<input id="peso" placeholder="Peso">
<input id="bf" placeholder="BF%">
<input id="cintura" placeholder="Cintura">
<input id="rcq" placeholder="RCQ">
<input id="rce" placeholder="RCE">
<input id="massa_magra" placeholder="Massa magra">
</div>
</div>

<!-- ANÁLISE -->
<div class="card">
<h2>Análise técnica</h2>

<div class="grid">
<textarea id="leitura" placeholder="Leitura técnica"></textarea>
<textarea id="sintese" placeholder="Síntese"></textarea>

<input id="avanco" placeholder="Principal avanço">
<input id="gargalo" placeholder="Principal gargalo">
<input id="prioridade" placeholder="Prioridade">
</div>
</div>

<!-- COMPORTAMENTO -->
<div class="card">
<h2>Comportamento</h2>

<div class="grid">
<input id="aderencia" placeholder="Aderência">
<input id="ambiente" placeholder="Ambiente">
<input id="sabotadores" placeholder="Sabotadores">
<textarea id="leitura_comportamental" placeholder="Leitura comportamental"></textarea>
</div>
</div>

<!-- DIRECIONAMENTO -->
<div class="card">
<h2>Direcionamento</h2>

<div class="grid">
<input id="manter" placeholder="Manter">
<input id="ajustar" placeholder="Ajustar">
<input id="foco" placeholder="Foco">
<input id="meta" placeholder="Meta">
</div>
</div>

<button id="salvar-avaliacao-btn">Salvar Avaliação</button>

</div>

<script>
document.getElementById("salvar-avaliacao-btn").addEventListener("click", () => {

  const clienteId = new URLSearchParams(window.location.search).get("id");

  const clientes = JSON.parse(localStorage.getItem("za_clientes") || "[]");
  const cliente = clientes.find(c => String(c.id) === String(clienteId));

  if (!cliente) {
    alert("Cliente não encontrado");
    return;
  }

  const nova = {
    id: Date.now(),
    data: new Date().toISOString(),

    titulo: document.getElementById("titulo").value,
    resumo: document.getElementById("resumo").value,
    objetivo: document.getElementById("objetivo").value,
    fase: document.getElementById("fase").value,

    pilares: {
      movimento: Number(document.getElementById("movimento").value),
      alimentacao: Number(document.getElementById("alimentacao").value),
      sono: Number(document.getElementById("sono").value),
      proposito: Number(document.getElementById("proposito").value),
      social: Number(document.getElementById("social").value),
      estresse: Number(document.getElementById("estresse").value)
    },

    metricas: {
      peso: document.getElementById("peso").value,
      bf: document.getElementById("bf").value,
      cintura: document.getElementById("cintura").value,
      rcq: document.getElementById("rcq").value,
      rce: document.getElementById("rce").value,
      massa_magra: document.getElementById("massa_magra").value
    },

    analise: {
      leitura: document.getElementById("leitura").value,
      sintese: document.getElementById("sintese").value,
      avanco_principal: document.getElementById("avanco").value,
      gargalo_principal: document.getElementById("gargalo").value,
      prioridade: document.getElementById("prioridade").value,
      aderencia: document.getElementById("aderencia").value,
      ambiente: document.getElementById("ambiente").value,
      sabotadores: document.getElementById("sabotadores").value,
      leitura_comportamental: document.getElementById("leitura_comportamental").value
    },

    direcionamento: {
      manter: document.getElementById("manter").value,
      ajustar: document.getElementById("ajustar").value,
      foco: document.getElementById("foco").value,
      meta: document.getElementById("meta").value
    }
  };

  cliente.avaliacoes = cliente.avaliacoes || [];
  cliente.avaliacoes.push(nova);

  localStorage.setItem("za_clientes", JSON.stringify(clientes));

  alert("Avaliação salva com sucesso");

  window.location.href = `../relatorio/index.html?id=${clienteId}`;
});
</script>

</body>
</html>
