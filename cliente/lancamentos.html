<section class="card">

  <div class="tabs">

    <!-- ========================= -->
    <!-- BASE PRÉ-DIAGNÓSTICO -->
    <!-- ========================= -->
    <div class="tab">
      <button class="tab-header">Base do pré-diagnóstico</button>
      <div class="tab-body">

        <div class="field">
          <label>Nome</label>
          <input id="nome" type="text" />
        </div>

        <div class="field">
          <label>Email</label>
          <input id="email" type="email" />
        </div>

        <div class="field">
          <label>Telefone</label>
          <input id="telefone" type="text" />
        </div>

        <div class="field">
          <label>Sexo para cálculo</label>
          <input id="sexo" type="text" />
        </div>

        <div class="field">
          <label>Data de nascimento</label>
          <input id="dataNascimento" type="date" />
        </div>

        <div class="field">
          <label>Idade</label>
          <input id="idade" type="number" />
        </div>

        <div class="field">
          <label>Objetivo inicial</label>
          <textarea id="objetivoInicial"></textarea>
        </div>

      </div>
    </div>

    <!-- ========================= -->
    <!-- SESSÃO + AVALIAÇÃO -->
    <!-- ========================= -->
    <div class="tab">
      <button class="tab-header">Sessão e avaliação</button>
      <div class="tab-body">

        <!-- Estrutura da sessão -->
        <h4 class="section-title">Estrutura da sessão</h4>

        <div class="field">
          <label>Tipo de sessão</label>
          <input id="tipoSessao" placeholder="Ex: avaliação inicial" />
        </div>

        <div class="field">
          <label>Observações da sessão</label>
          <textarea id="obsSessao"></textarea>
        </div>

        <!-- Avaliação física -->
        <h4 class="section-title">Avaliação física</h4>

        <div class="grid grid-2">
          <input id="peso" placeholder="Peso (kg)" type="number" />
          <input id="altura" placeholder="Altura (cm)" type="number" />
        </div>

        <div class="grid grid-2">
          <input id="cintura" placeholder="Cintura (cm)" type="number" />
          <input id="quadril" placeholder="Quadril (cm)" type="number" />
        </div>

        <div class="field">
          <input id="abdomen" placeholder="Abdômen (cm)" type="number" />
        </div>

        <button class="btn" onclick="calcularAvaliacao()">Calcular</button>

        <div class="grid grid-2">
          <input id="imc" placeholder="IMC" disabled />
          <input id="rcq" placeholder="RCQ" disabled />
          <input id="rce" placeholder="RCE" disabled />
          <input id="percGordura" placeholder="% Gordura" disabled />
        </div>

      </div>
    </div>

    <!-- ========================= -->
    <!-- ANÁLISE DO CASO -->
    <!-- ========================= -->
    <div class="tab">
      <button class="tab-header">Análise do caso</button>
      <div class="tab-body">

        <!-- Radar revisado -->
        <h4 class="section-title">Radar revisado</h4>

        <div class="grid grid-2">
          <input id="radarMovimento" placeholder="Movimento (0-10)" />
          <input id="radarAlimentacao" placeholder="Alimentação (0-10)" />
          <input id="radarSono" placeholder="Sono (0-10)" />
          <input id="radarEstresse" placeholder="Estresse (0-10)" />
          <input id="radarSocial" placeholder="Social (0-10)" />
          <input id="radarProposito" placeholder="Propósito (0-10)" />
        </div>

        <!-- Diagnóstico -->
        <h4 class="section-title">Diagnóstico completo</h4>

        <div class="field">
          <label>Gargalo principal</label>
          <input id="gargalo" />
        </div>

        <div class="field">
          <label>Perfil de entrada</label>
          <input id="perfilEntrada" />
        </div>

        <div class="field">
          <label>Prioridade imediata</label>
          <input id="prioridade" />
        </div>

        <div class="field">
          <label>Leitura do caso</label>
          <textarea id="leituraCaso"></textarea>
        </div>

        <div class="field">
          <label>Síntese diagnóstica</label>
          <textarea id="sintese"></textarea>
        </div>

      </div>
    </div>

    <!-- ========================= -->
    <!-- ACOMPANHAMENTO -->
    <!-- ========================= -->
    <div class="tab">
      <button class="tab-header">Acompanhamento</button>
      <div class="tab-body">

        <h4 class="section-title">Novo acompanhamento</h4>

        <input id="dataAcompanhamento" type="date" />

        <div class="field">
          <label>Aderência</label>
          <input id="aderencia" />
        </div>

        <div class="field">
          <label>Evolução</label>
          <textarea id="evolucao"></textarea>
        </div>

        <div class="field">
          <label>Dificuldades</label>
          <textarea id="dificuldades"></textarea>
        </div>

        <div class="field">
          <label>Ajustes realizados</label>
          <textarea id="ajustes"></textarea>
        </div>

        <button class="btn primary" onclick="salvarAcompanhamento()">
          Salvar acompanhamento
        </button>

      </div>
    </div>

  </div>
</section>
