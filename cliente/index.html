<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cliente | Zona Azul</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=56" />
</head>
<body>

  <div class="app-shell">

    <aside class="sidebar">
      <h1>Zona Azul</h1>
      <nav>
        <a href="../index.html">Dashboard</a>
        <a href="../pre-diagnostico/">Pré-diagnóstico</a>
        <a href="../clientes/">Clientes</a>
      </nav>
    </aside>

    <main class="main">

      <div class="topbar">
        <div>
          <h2 id="cliente-nome">Cliente</h2>
          <p id="cliente-objetivo">Objetivo</p>
        </div>

        <div>
          <button id="voltar-btn" type="button">Voltar</button>
        </div>
      </div>

      <section class="grid-3">

        <div class="card card-main">
          <h3>🧩 Lançamentos</h3>
          <p>Registrar diagnóstico, evolução e dados do cliente.</p>
          <button data-open="lancamentos" type="button">Abrir</button>
        </div>

        <div class="card card-main">
          <h3>📊 Relatório completo</h3>
          <p>Visualizar análise consolidada do cliente.</p>
          <button data-open="relatorio" type="button">Abrir relatório</button>
        </div>

        <div class="card card-main">
          <h3>🧠 Planejamento do treinador</h3>
          <p>Definir estratégia, comportamento e treino.</p>
          <button data-open="planejamento" type="button">Abrir planejamento</button>
        </div>

      </section>

    </main>

  </div>

  <!-- CORE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js?v=1"></script>
  <script src="../assets/js/storage.js?v=1"></script>

  <!-- PAGE -->
  <script src="../assets/js/cliente-hub.js?v=1"></script>
</body>
</html>
