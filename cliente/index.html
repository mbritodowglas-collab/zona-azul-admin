<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cliente | Trackion System</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=56" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-0: #020816;
      --bg-1: #061126;
      --bg-2: #0a1830;
      --panel: rgba(10, 24, 48, 0.78);
      --panel-2: rgba(8, 20, 40, 0.92);
      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);
      --text: #f3f8ff;
      --muted: #9cb0cb;
      --muted-2: #7f92ad;
      --blue-1: #47b8ff;
      --blue-2: #1f7cff;
      --green-1: #7cff5a;
      --green-2: #41d13f;
      --success: #9dffd6;
      --warning: #ffe08a;
      --danger: #ffb0b0;
      --shadow-xl: 0 24px 60px rgba(0,0,0,0.35);
      --shadow-lg: 0 18px 42px rgba(0,0,0,0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71,184,255,0.16), transparent 22%),
        radial-gradient(circle at top right, rgba(124,255,90,0.12), transparent 18%),
        radial-gradient(circle at 50% 0%, rgba(31,124,255,0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      overflow-x: hidden;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));
      backdrop-filter: blur(12px);
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-lg);
      margin-bottom: 26px;
    }

    .brand-badge {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      box-shadow: 0 14px 28px rgba(31,124,255,0.22);
      letter-spacing: 0.04em;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .brand-highlight {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #47b8ff, #7cff5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav a {
      min-height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      border-radius: 16px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 700;
      transition: all 0.18s ease;
      border: 1px solid transparent;
    }

    .nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border-color: var(--line);
      transform: translateX(2px);
    }

    .nav a.active {
      color: #ffffff;
      background: linear-gradient(135deg, rgba(71,184,255,0.12), rgba(124,255,90,0.08));
      border-color: rgba(71,184,255,0.16);
    }

    .main {
      padding: 24px;
      min-width: 0;
    }

    .page-wrap {
      display: grid;
      gap: 22px;
      max-width: 1520px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar h2 {
      margin: 0;
      font-size: 38px;
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #ffffff;
    }

    .topbar p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
      max-width: 760px;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: #ffffff;
      border: 1px solid var(--line);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      color: #ffffff;
      box-shadow: 0 12px 22px rgba(31,124,255,0.18);
    }

    .hero {
      padding: 28px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at top right, rgba(124,255,90,0.10), transparent 18%),
        linear-gradient(135deg, rgba(71,184,255,0.16), rgba(124,255,90,0.08)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-xl);
    }

    .hero-kicker {
      margin: 0 0 10px;
      color: #b9ebff;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .hero h3 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.02;
      letter-spacing: -0.045em;
      color: #ffffff;
      max-width: 820px;
    }

    .hero p {
      margin: 0;
      color: #d6e3f5;
      font-size: 15px;
      line-height: 1.8;
      max-width: 860px;
    }

    .hero-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      color: #edf5ff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.01em;
    }

    .chip.success {
      color: var(--success);
      background: rgba(52, 211, 153, 0.12);
      border-color: rgba(52, 211, 153, 0.18);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .summary-card {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-lg);
    }

    .summary-label {
      display: block;
      margin-bottom: 12px;
      color: var(--muted-2);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .summary-value {
      display: block;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      color: #ffffff;
    }

    .summary-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      padding: 20px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-lg);
      min-width: 0;
      backdrop-filter: blur(10px);
    }

    .card-main {
      display: grid;
      gap: 14px;
      align-content: start;
      min-height: 220px;
    }

    .card-main h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .card-main p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .card-link-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.2;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .hub-card-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
    }

    .info-list {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .info-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .info-label {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .info-value {
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      text-align: right;
      line-height: 1.5;
    }

    .cliente-avatar-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 14px;
    }

    .cliente-avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(31,124,255,0.20);
      flex-shrink: 0;
    }

    .cliente-avatar-meta strong {
      display: block;
      font-size: 16px;
      color: #fff;
    }

    .cliente-avatar-meta span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1180px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3,
      .hub-card-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .sidebar,
      .main {
        padding: 16px;
      }

      .topbar h2 {
        font-size: 30px;
      }

      .hero {
        padding: 22px 18px;
      }

      .hero h3 {
        font-size: 28px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .topbar-actions {
        width: 100%;
      }

      #logout-btn,
      #voltar-btn {
        width: 100%;
      }

      .card-link-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

      <div class="brand">
        <div class="brand-badge">TR</div>
        <div>
          <h1>Trackion System</h1>
          <span class="brand-highlight">CORPO • MENTE • PERFORMANCE</span>
        </div>
      </div>
