<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cliente | Zona Azul</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=30" />
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <h1>Zona Azul</h1>
    <nav>
      <a href="../index.html">Dashboard</a>
      <a href="../pre-diagnostico/">Pré-diagnóstico</a>
      <a href="../clientes/">Clientes</a>
    </nav>
  </aside>

  <main class="main">

    <!-- TOPO -->
    <div class="topbar">
      <div>
        <h2 id="cliente-nome">Cliente</h2>
        <p id="cliente-objetivo">Objetivo</p>
      </div>

      <div>
        <button id="voltar-btn">Voltar</button>
      </div>
    </div>

    <!-- CARDS PRINCIPAIS -->
    <section class="grid-3">

      <!-- LANÇAMENTOS -->
      <div class="card card-main">
        <h3>🧩 Lançamentos</h3>
        <p>Registrar diagnóstico, evolução e dados do cliente.</p>

        <button data-open="lancamentos">Abrir</button>
      </div>

      <!-- RELATÓRIO -->
      <div class="card card-main">
        <h3>📊 Relatório completo</h3>
        <p>Visualizar análise consolidada do cliente.</p>

        <button data-open="relatorio">Abrir relatório</button>
      </div>

      <!-- PLANEJAMENTO -->
      <div class="card card-main">
        <h3>🧠 Planejamento do treinador</h3>
        <p>Definir estratégia, comportamento e treino.</p>

        <button data-open="planejamento">Abrir planejamento</button>
      </div>

    </section>

  </main>

</div>

<script src="../assets/js/storage.js"></script>
<script src="../assets/js/cliente.js"></script>

</body>
</html>
