<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano do Cliente | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css">

  <style>
    body {
      margin: 0;
      font-family: inherit;
      background: linear-gradient(180deg, #061126, #020816);
      color: #f3f8ff;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 22px;
    }

    .header {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .badge {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg,#47b8ff,#1f7cff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
    }

    .highlight {
      font-size: 11px;
      letter-spacing: 0.12em;
      background: linear-gradient(90deg,#47b8ff,#7cff5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .cliente-info {
      margin-top: 12px;
    }

    .cliente-nome {
      font-size: 24px;
      font-weight: bold;
    }

    .section {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .text {
      line-height: 1.7;
      color: #dbeafe;
      white-space: pre-wrap;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    @media(max-width:700px){
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      display: inline-block;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      opacity: 0.6;
      font-size: 12px;
      margin-top: 10px;
    }

    @media print {
      body { background: #fff; color:#000; }
      .section { break-inside: avoid; }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <div class="brand">
        <div class="badge">TR</div>
        <div>
          <h1>Trackion System</h1>
          <div class="highlight">CORPO • MENTE • PERFORMANCE</div>
        </div>
      </div>

      <div class="cliente-info">
        <div class="cliente-nome" id="cliente-nome">Cliente</div>
        <div id="cliente-meta"></div>
      </div>
    </div>

    <div class="section">
      <h2>Resumo do Plano</h2>
      <div class="grid grid-2">
        <div>
          <strong>Objetivo</strong>
          <div class="text" id="plano-objetivo"></div>
        </div>
        <div>
          <strong>Foco do mês</strong>
          <div class="text" id="plano-foco"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Direcionamento Comportamental</h2>
      <div class="text" id="plano-habitos"></div>
    </div>

    <div class="section">
      <h2>Estratégia de Treino</h2>
      <div class="text" id="plano-treino"></div>
    </div>

    <div class="section">
      <h2>Cardio e Rotina</h2>
      <div class="text" id="plano-cardio"></div>
    </div>

    <div class="section">
      <h2>Diretrizes Alimentares</h2>
      <div class="text" id="plano-nutri"></div>
    </div>

    <div class="section">
      <h2>Regras do Jogo</h2>
      <div class="text" id="plano-regras"></div>
    </div>

    <div class="section">
      <h2>Mensagem do Treinador</h2>
      <div class="text" id="plano-mensagem"></div>
    </div>

    <div class="footer">
      Trackion System © | acompanhamento profissional
    </div>

  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/plano-cliente.js"></script>

</body>
</html>
