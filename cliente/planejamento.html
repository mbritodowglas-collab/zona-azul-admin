<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planejamento | Trackion System</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=60" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-0: #020816;
      --bg-1: #061126;
      --bg-2: #0a1830;
      --panel: rgba(10, 24, 48, 0.78);
      --panel-2: rgba(8, 20, 40, 0.92);
      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);
      --text: #f3f8ff;
      --muted: #9cb0cb;
      --muted-2: #7f92ad;
      --blue-1: #47b8ff;
      --blue-2: #1f7cff;
      --green-1: #7cff5a;
      --green-2: #41d13f;
      --success: #9dffd6;
      --warning: #ffe08a;
      --danger: #ffb0b0;
      --shadow-xl: 0 24px 60px rgba(0,0,0,0.35);
      --shadow-lg: 0 18px 42px rgba(0,0,0,0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71,184,255,0.16), transparent 22%),
        radial-gradient(circle at top right, rgba(124,255,90,0.12), transparent 18%),
        radial-gradient(circle at 50% 0%, rgba(31,124,255,0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      overflow-x: hidden;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));
      backdrop-filter: blur(12px);
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-lg);
      margin-bottom: 26px;
    }

    .brand-badge {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      box-shadow: 0 14px 28px rgba(31,124,255,0.22);
      letter-spacing: 0.04em;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .brand-highlight {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #47b8ff, #7cff5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav a {
      min-height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      border-radius: 16px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 700;
      transition: all 0.18s ease;
      border: 1px solid transparent;
    }

    .nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      transform: translateX(2px);
    }

    .nav a.active {
      color: #ffffff;
      background: linear-gradient(135deg, rgba(71,184,255,0.12), rgba(124,255,90,0.08));
      border-color: rgba(71,184,255,0.16);
    }

    .main {
      padding: 24px;
      min-width: 0;
    }

    .planner-wrap {
      display: grid;
      gap: 24px;
      max-width: 1560px;
    }

    .planner-hero {
      background:
        radial-gradient(circle at top right, rgba(124,255,90,0.10), transparent 18%),
        linear-gradient(135deg, rgba(71,184,255,0.16), rgba(124,255,90,0.08)),
        var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: var(--shadow-xl);
    }

    .planner-hero-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .planner-avatar {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      box-shadow: 0 18px 32px rgba(31,124,255,0.24);
    }

    .planner-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #fff;
    }

    .planner-sub {
      margin: 6px 0 0;
      color: rgba(235,240,255,0.72);
      font-size: 15px;
      line-height: 1.6;
    }

    .planner-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .cliente-btn,
    .cliente-btn-secundario,
    .cliente-btn-abrir {
      min-height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .cliente-btn:hover,
    .cliente-btn-secundario:hover,
    .cliente-btn-abrir:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .cliente-btn-secundario {
      background: rgba(255,255,255,0.06);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .cliente-btn,
    .cliente-btn-abrir {
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      color: #ffffff;
      box-shadow: 0 12px 22px rgba(31,124,255,0.18);
    }

    .planner-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .summary-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow-lg);
    }

    .summary-card small {
      display: block;
      margin-bottom: 8px;
      color: rgba(235,240,255,0.58);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      font-weight: 700;
    }

    .summary-card strong {
      display: block;
      color: #fff;
      font-size: 17px;
      line-height: 1.45;
    }

    .planner-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.9fr);
      gap: 24px;
      align-items: start;
    }

    .planner-col {
      display: grid;
      gap: 20px;
    }

    .planner-side-sticky {
      position: sticky;
      top: 20px;
    }

    .card {
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .card-body {
      padding: 22px;
    }

    .planner-accordion {
      overflow: hidden;
    }

    .planner-accordion .card-header {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .planner-accordion:not(.is-open) .card-header {
      border-bottom: 0;
    }

    .planner-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      text-align: left;
      background: transparent;
      border: 0;
      cursor: pointer;
      color: inherit;
      padding: 0;
    }

    .planner-toggle h3 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .planner-toggle p {
      margin: 0;
      color: rgba(235,240,255,0.64);
      line-height: 1.6;
    }

    .planner-icon {
      flex: 0 0 auto;
      font-size: 24px;
      line-height: 1;
      color: rgba(255,255,255,0.72);
      transition: transform 0.22s ease;
    }

    .planner-accordion.is-open .planner-icon {
      transform: rotate(180deg);
    }

    .planner-panel {
      display: none;
    }

    .planner-accordion.is-open .planner-panel {
      display: block;
    }

    .subsection-title {
      margin: 0 0 16px;
      font-size: 15px;
      color: #fff;
    }

    .planner-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 18px 0;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .planner-badge {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(235,240,255,0.88);
      font-size: 13px;
      font-weight: 600;
    }

    .planner-note-box {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      color: rgba(235,240,255,0.88);
      line-height: 1.6;
    }

    .planner-inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .planner-output {
      min-height: 280px;
      font-family: inherit;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .planner-status-card {
      display: grid;
      gap: 14px;
    }

    .planner-status-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .planner-status-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .planner-status-row span {
      color: rgba(235,240,255,0.62);
      font-size: 13px;
    }

    .planner-status-row strong {
      color: #fff;
      text-align: right;
      font-size: 14px;
      line-height: 1.4;
    }

    .empty-state-box {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.08);
      color: rgba(235,240,255,0.72);
    }

    .notes-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .note-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 14px;
    }

    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .note-meta {
      display: grid;
      gap: 4px;
    }

    .note-meta strong {
      color: #fff;
      font-size: 14px;
    }

    .note-meta span {
      color: rgba(235,240,255,0.62);
      font-size: 12px;
    }

    .note-text {
      color: rgba(235,240,255,0.9);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status-pill.status-ativo {
      background: rgba(34,197,94,0.12);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.22);
    }

    .status-pill.status-vazio {
      background: rgba(234,179,8,0.12);
      color: #fde68a;
      border: 1px solid rgba(234,179,8,0.22);
    }

    .danger-zone {
      border: 1px solid rgba(239,68,68,0.18);
      background: rgba(239,68,68,0.04);
      border-radius: 22px;
      padding: 16px;
    }

    .danger-zone h4 {
      margin: 0 0 10px;
      color: #fff;
    }

    .danger-zone p {
      margin: 0 0 14px;
      color: rgba(235,240,255,0.72);
      line-height: 1.6;
    }

    .archived-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .archived-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
    }

    .archived-item strong {
      display: block;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .archived-item span {
      display: block;
      color: rgba(235,240,255,0.66);
      font-size: 13px;
      line-height: 1.5;
    }

    .cycle-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 10px;
      width: fit-content;
    }

    .cycle-pill.completo {
      background: rgba(34,197,94,0.14);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.22);
    }

    .cycle-pill.parcial {
      background: rgba(245,158,11,0.14);
      color: #fcd34d;
      border: 1px solid rgba(245,158,11,0.22);
    }

    .cycle-pill.abandonado {
      background: rgba(239,68,68,0.14);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.22);
    }

    .za-feedback-field {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .za-feedback-field label,
    .field label {
      color: rgba(230,235,255,0.88);
      font-size: 13px;
      font-weight: 700;
    }

    .za-feedback-field select,
    .za-feedback-field textarea,
    .za-feedback-field input,
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #fff;
      padding: 12px 14px;
      font: inherit;
      outline: none;
      box-sizing: border-box;
    }

    .za-feedback-field textarea,
    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cliente-section-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .cliente-hub-updated {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }

      .planner-summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .planner-grid {
        grid-template-columns: 1fr;
      }

      .planner-side-sticky {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .sidebar,
      .main {
        padding: 16px;
      }

      .planner-summary-grid {
        grid-template-columns: 1fr;
      }

      .planner-title {
        font-size: 24px;
      }

      .planner-avatar {
        width: 64px;
        height: 64px;
      }

      .grid.cols-2,
      .grid.cols-3 {
        grid-template-columns: 1fr;
      }

      .planner-actions {
        width: 100%;
      }

      .planner-actions > * {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">TR</div>
        <div>
          <h1>Trackion System</h1>
          <span class="brand-highlight">CORPO • MENTE • PERFORMANCE</span>
        </div>
      </div>

      <nav class="nav">
        <a href="../index.html">Dashboard</a>
        <a href="../pre-diagnostico/">Pré-diagnóstico</a>
        <a class="active" href="../clientes/">Clientes</a>
      </nav>
    </aside>

    <main class="main">
      <div id="planejamento-not-found" class="card hidden">
        <div class="card-body">
          <div class="empty-state-box">Cliente não encontrado.</div>
        </div>
      </div>

      <div id="planejamento-page" class="planner-wrap">
        <section class="planner-hero">
          <div class="planner-hero-left">
            <div class="planner-avatar" id="planner-avatar">C</div>
            <div>
              <h2 class="planner-title" id="planner-nome">Planejamento</h2>
              <p class="planner-sub" id="planner-sub">
                Estratégia executiva do caso.
              </p>
              <div style="margin-top: 12px;">
                <span id="planejamento-status-pill" class="status-pill status-ativo">Ativo</span>
              </div>
            </div>
          </div>

          <div class="planner-actions">
            <a id="voltar-cliente-link" class="cliente-btn-secundario" href="../cliente/index.html">Voltar ao cliente</a>
            <a id="abrir-plano-cliente-btn" class="cliente-btn-secundario" href="./plano-cliente.html">Versão cliente / PDF</a>
            <button id="puxar-diagnostico-btn" type="button" class="cliente-btn-secundario">Puxar diagnóstico</button>
            <button id="salvar-planejamento-topo-btn" type="button" class="cliente-btn-abrir">Salvar planejamento</button>
            <button id="logout-btn" type="button" class="cliente-btn-secundario">Sair</button>
          </div>
        </section>

        <section class="planner-summary-grid">
          <div class="summary-card">
            <small>Objetivo</small>
            <strong id="summary-objetivo">—</strong>
          </div>

          <div class="summary-card">
            <small>Gargalo principal</small>
            <strong id="summary-gargalo">—</strong>
          </div>

          <div class="summary-card">
            <small>Prioridade imediata</small>
            <strong id="summary-prioridade">—</strong>
          </div>

          <div class="summary-card">
            <small>Foco do mês 1</small>
            <strong id="summary-foco">—</strong>
          </div>
        </section>

        <section class="planner-grid">
          <div class="planner-col">
            <div id="planner-editable-area">
              <section class="card planner-accordion is-open" data-accordion="estrategia">
                <div class="card-header">
                  <button class="planner-toggle" type="button"
