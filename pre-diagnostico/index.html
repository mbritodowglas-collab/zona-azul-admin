<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pré-diagnóstico | Trackion System</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=1" />

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-0: #020816;
      --bg-1: #061126;
      --panel: rgba(10, 24, 48, 0.78);
      --line: rgba(255,255,255,0.08);
      --text: #f3f8ff;
      --muted: #9cb0cb;
      --blue-1: #47b8ff;
      --blue-2: #1f7cff;
      --green-1: #7cff5a;
      --shadow-lg: 0 18px 42px rgba(0,0,0,0.28);
      --radius-lg: 22px;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71,184,255,0.16), transparent 22%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
    }

    .app-shell {
      display: grid;
      grid-template-columns: 292px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    /* 🔥 NOVA LOGO */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-lg);
      margin-bottom: 26px;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
    }

    .brand-highlight {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue-1), var(--green-1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav a {
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 700;
    }

    .nav a.active {
      background: rgba(71,184,255,0.1);
      color: #fff;
    }

    .main {
      padding: 24px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 32px;
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      border-radius: var(--radius-lg);
      background: var(--panel);
      border: 1px solid var(--line);
    }

  </style>
</head>

<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <div class="brand-logo">
        <img src="../assets/img/trackion-logo.png" alt="Trackion System" />
      </div>
      <div>
        <h1>Trackion System</h1>
        <span class="brand-highlight">CORPO • MENTE • PERFORMANCE</span>
      </div>
    </div>

    <nav class="nav">
      <a href="../index.html">Dashboard</a>
      <a class="active" href="./">Pré-diagnóstico</a>
      <a href="../clientes/">Clientes</a>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h2>Pré-diagnóstico</h2>
      <p style="color:var(--muted)">
        Coleta inicial para análise do cliente dentro do Trackion System.
      </p>
    </div>

    <div class="card">
      <!-- SEU FORM ORIGINAL CONTINUA AQUI -->
    </div>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/guard.js"></script>
<script src="../assets/js/storage.js"></script>
<script src="../assets/js/logout.js"></script>

</body>
</html>
