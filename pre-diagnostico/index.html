<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pré-Diagnóstico | Zona Azul</title>

  <link rel="stylesheet" href="../assets/css/global.css" />
</head>

<body>
  <main class="container">
    <h1>Pré-Diagnóstico</h1>

    <div class="public-link">
      <strong>Link do formulário:</strong>
      <div id="public-form-link-box"></div>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Leads</th>
        </tr>
      </thead>

      <tbody id="leads-table-body"></tbody>
    </table>

    <div id="empty-leads" class="hidden">
      Nenhum lead encontrado.
    </div>
  </main>

  <!-- MODAL -->
  <div id="action-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="action-modal-title"></h2>
      <p id="action-modal-subtitle"></p>
      <p id="action-modal-text"></p>

      <div class="modal-actions">
        <button id="cancel-action-btn">Cancelar</button>
        <button id="confirm-action-btn">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- CORE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js?v=1"></script>
  <script src="../assets/js/storage.js?v=1"></script>

  <!-- PAGE -->
  <script src="../assets/js/pre-diagnostico.js?v=1"></script>
</body>
</html>
