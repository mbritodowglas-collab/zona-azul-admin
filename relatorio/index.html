<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <!-- PDF ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #061126;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .report-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 16px;
      min-height: 48px;
      padding: 0 18px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, opacity .15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: .97;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .btn.primary,
    .btn:not(.secondary) {
      color: #fff;
      background: linear-gradient(135deg, #57b2ff, #2f86ff);
      box-shadow: 0 10px 24px rgba(47, 134, 255, 0.22);
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .premium-report-hero {
      padding: 32px 28px 24px;
      color: #fff;
      border-bottom: 6px solid #c7a43a;
      background:
        radial-gradient(circle at 88% 10%, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(180deg, #13365a 0%, #0d2741 100%);
    }

    .premium-report-kicker {
      color: #d6b760;
      font-weight: 900;
      letter-spacing: 0.10em;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .premium-report-hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4.8vw, 3rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: #fff;
    }

    .premium-report-subtitle {
      margin: 12px 0 0;
      max-width: 760px;
      color: rgba(255,255,255,0.86);
      font-size: 15px;
      line-height: 1.7;
    }

    .premium-report-meta {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .premium-report-meta > div {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .meta-label {
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.35;
    }

    .premium-report-meta strong {
      color: #fff;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 800;
      display: block;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 24px;
    }

    .report-section {
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fbf8f1;
      border: 1px solid rgba(19, 39, 63, 0.05);
      box-shadow: 0 10px 28px rgba(12, 22, 38, 0.06);
    }

    .report-section:first-child {
      margin-top: 0;
    }

    .report-section h2 {
      margin: 0 0 14px;
      color: #10243d;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .report-section h3 {
      margin: 0 0 8px;
      color: #10243d;
      font-size: 15px;
      line-height: 1.3;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .report-grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .report-grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .report-info-card,
    .report-text-block {
      background: #ffffff;
      border: 1px solid rgba(19, 39, 63, 0.08);
      border-radius: 12px;
      padding: 14px;
      min-width: 0;
    }

    .report-info-card span {
      display: block;
      margin-bottom: 8px;
      color: #7d8797;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      line-height: 1.35;
    }

    .report-info-card strong {
      display: block;
      color: #13273f;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 800;
      word-break: break-word;
    }

    .report-text-block p,
    .report-mini-text {
      margin: 0;
      color: #5d6776;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .report-mini-text {
      margin-top: 8px;
    }

    .report-chart-wrap {
      height: 320px;
      background: #ffffff;
      border: 1px solid rgba(19, 39, 63, 0.08);
      border-radius: 12px;
      padding: 10px;
    }

    .parecer-input {
      width: 100%;
      min-height: 180px;
      border: 1px solid rgba(19, 39, 63, 0.08);
      border-radius: 12px;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      background: #ffffff;
      color: #13273f;
      font: inherit;
      line-height: 1.7;
    }

    .parecer-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      .premium-report-hero {
        padding: 24px 20px 20px;
      }

      .premium-report-meta,
      .report-grid.cols-2,
      .report-grid.cols-3 {
        grid-template-columns: 1fr;
      }

      .premium-report-body {
        padding: 18px;
      }

      .report-section {
        padding: 18px;
      }

      .report-actions {
        flex-direction: column;
      }

      .report-actions > * {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="report-premium-wrap">
    <div class="report-actions">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn primary" id="print-report-btn" type="button">Gerar PDF</button>
    </div>

    <article class="premium-report-card">
      <header class="premium-report-hero">
        <div class="premium-report-kicker">TRACKION SYSTEM</div>

        <h1>SEU PERFIL DE LONGEVIDADE</h1>

        <p class="premium-report-subtitle">
          Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor.
        </p>

        <div class="premium-report-meta">
          <div>
            <span class="meta-label">Cliente</span>
            <strong id="report-lead-name">Carregando...</strong>
          </div>

          <div>
            <span class="meta-label">Data</span>
            <strong id="report-date">--</strong>
          </div>

          <div>
            <span class="meta-label">Responsável técnico</span>
            <strong id="report-profissional">--</strong>
          </div>

          <div>
            <span class="meta-label">CREF</span>
            <strong id="report-cref">--</strong>
          </div>
        </div>
      </header>

      <div class="premium-report-body" id="report-body"></div>
    </article>
  </main>

  <script src="../assets/js/supabase.js?v=1"></script>
  <script src="../assets/js/storage.js?v=1"></script>
  <script src="../assets/js/calculos.js?v=18"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=FIXO_FINAL_V1"></script>
</body>
</html>
