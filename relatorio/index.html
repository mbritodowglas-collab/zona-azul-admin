<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <style>
    .report-premium-shell {
      background: #061126 !important;
      color: #f3f8ff !important;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .premium-report-hero {
      padding: 28px 24px 20px;
    }

    .premium-report-kicker {
      color: #47b8ff;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 12px;
    }

    .premium-report-hero h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .premium-report-subtitle {
      font-size: 14px;
      opacity: 0.85;
    }

    .premium-report-meta {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 12px;
    }

    .premium-report-meta > div {
      background: rgba(255,255,255,0.08);
      padding: 14px;
      border-radius: 14px;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 20px;
    }

    .report-section {
      margin-top: 20px;
      padding: 20px;
      border-radius: 18px;
      background: #fffaf2;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 { grid-template-columns: repeat(2,1fr); }
    .cols-3 { grid-template-columns: repeat(3,1fr); }

    .report-info-card {
      background: #fff;
      padding: 12px;
      border-radius: 12px;
    }

    .report-chart-wrap {
      height: 300px;
      margin-top: 10px;
      background: #fff;
      border-radius: 12px;
    }

    .report-actions {
      margin-bottom: 16px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg,#47b8ff,#1f7cff);
      color: white;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.1);
    }

    .parecer-input {
      width: 100%;
      min-height: 200px;
    }

    /* ========================= PRINT ========================= */

    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      html {
        zoom: 1 !important;
      }

      html, body {
        background: #f3efe6 !important;
        -webkit-print-color-adjust: exact !important;
      }

      .report-actions {
        display: none !important;
      }

      .premium-report-card {
        background: #f3efe6 !important;
        box-shadow: none !important;
      }

      .premium-report-hero {
        background: linear-gradient(180deg,#0d2342,#061126) !important;
        color: #fff !important;
        padding: 20px !important;
      }

      .premium-report-meta > div {
        background: rgba(255,255,255,0.15) !important;
      }

      .premium-report-body {
        background: #f3efe6 !important;
      }

      .report-section {
        background: #fffaf2 !important;
        break-inside: avoid;
      }

      .report-grid.cols-2 {
        grid-template-columns: 1fr !important;
      }

      .report-grid.cols-3 {
        grid-template-columns: repeat(2,1fr) !important;
      }

      .report-info-card {
        background: #fff !important;
      }

      .report-chart-wrap {
        background: #fff !important;
      }

      #parecer-render-section {
        break-inside: avoid;
      }
    }

  </style>
</head>

<body class="report-premium-shell">

  <main class="report-premium-wrap">

    <div class="report-actions">
      <button class="btn secondary" onclick="history.back()">Voltar</button>
      <button class="btn" id="print-report-btn">Baixar PDF</button>
    </div>

    <article class="premium-report-card">

      <header class="premium-report-hero">
        <div class="premium-report-kicker">◆ TRACKION SYSTEM ◆</div>

        <h1>SEU PERFIL DE LONGEVIDADE</h1>

        <p class="premium-report-subtitle">
          Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor — aplicado de forma prática pelo Trackion System.
        </p>

        <div class="premium-report-meta">
          <div>
            <span>Cliente</span>
            <strong id="report-lead-name">...</strong>
          </div>

          <div>
            <span>Data</span>
            <strong id="report-date">...</strong>
          </div>

          <div>
            <span>Profissional</span>
            <strong id="report-profissional">...</strong>
          </div>

          <div>
            <span>CREF</span>
            <strong id="report-cref">...</strong>
          </div>
        </div>
      </header>

      <div class="premium-report-body" id="report-body"></div>

    </article>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=22"></script>

  <script>
    document.getElementById("print-report-btn")
      .addEventListener("click", () => window.print());
  </script>

</body>
</html>
