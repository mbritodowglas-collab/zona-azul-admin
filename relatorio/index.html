<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <!-- PDF ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #061126;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
    }

    .premium-report-hero {
      padding: 32px 28px 24px;
      color: #fff;
    }

    .premium-report-kicker {
      color: #47b8ff;
      font-weight: 800;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .premium-report-hero h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .premium-report-meta {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, 1fr);
      margin-top: 20px;
    }

    /* 🔥 CORREÇÃO DEFINITIVA DOS QUADROS */
    .premium-report-meta > div {
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
    }

    .meta-label {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      display: block;
    }

    .premium-report-meta strong {
      color: #fff;
      font-size: 16px;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 24px;
    }

    .report-section {
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fff;
    }

    .report-section h2 {
      margin-bottom: 12px;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .report-info-card {
      background: #f5f5f5;
      padding: 14px;
      border-radius: 12px;
    }

    .report-info-card span {
      font-size: 11px;
      color: #777;
    }

    .report-info-card strong {
      display: block;
      margin-top: 4px;
    }

    .report-chart-wrap {
      height: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
    }

    .btn {
      background: #47b8ff;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.secondary {
      background: #333;
    }

    .report-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    /* 🔥 PARECER PROFISSIONAL FINAL */
    .parecer-render {
      display: block;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 14px;
      color: #334155 !important;
      background: #f8f8f8 !important;
      border-radius: 12px;
      padding: 14px;
      min-height: 180px;
      box-sizing: border-box;
    }

    .parecer-input {
      width: 100%;
      min-height: 160px;
      border-radius: 12px;
      padding: 12px;
      border: none;
      margin-bottom: 10px;
      font-family: inherit;
    }

    @media (max-width: 720px) {
      .cols-2,
      .cols-3 {
        grid-template-columns: 1fr;
      }
    }

    .no-print {
      display: block;
    }

    @media print {
      .no-print {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <main class="report-premium-wrap">

    <div class="report-actions no-print">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn" id="print-report-btn">Gerar PDF</button>
    </div>

    <article class="premium-report-card">

      <header class="premium-report-hero">

        <div class="premium-report-kicker">TRACKION SYSTEM</div>

        <h1>SEU PERFIL DE LONGEVIDADE</h1>

        <p>
          Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor.
        </p>

        <div class="premium-report-meta">

          <div>
            <span class="meta-label">Cliente</span>
            <strong id="report-lead-name">Carregando...</strong>
          </div>

          <div>
            <span class="meta-label">Data</span>
            <strong id="report-date">--</strong>
          </div>

          <div>
            <span class="meta-label">Responsável</span>
            <strong id="report-profissional">Márcio Dowglas</strong>
          </div>

          <div>
            <span class="meta-label">CREF</span>
            <strong id="report-cref">003918-G/AM</strong>
          </div>

        </div>

      </header>

      <div class="premium-report-body" id="report-body"></div>

    </article>

  </main>

  <!-- SISTEMA -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/calculos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=final"></script>

  <!-- PDF -->
  <script>
    document.getElementById("print-report-btn").addEventListener("click", async () => {

      const btn = document.getElementById("print-report-btn");
      btn.innerText = "Gerando PDF...";
      btn.disabled = true;

      const { jsPDF } = window.jspdf;
      const element = document.querySelector(".premium-report-card");

      await document.fonts.ready;
      await new Promise(r => setTimeout(r, 300));

      const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true,
        backgroundColor: "#f3efe6"
      });

      const imgData = canvas.toDataURL("image/jpeg", 1);

      const pdf = new jsPDF("p", "mm", "a4");

      const imgWidth = 190;
      const imgHeight = canvas.height * imgWidth / canvas.width;

      let heightLeft = imgHeight;
      let position = 0;

      pdf.addImage(imgData, "JPEG", 10, position + 10, imgWidth, imgHeight);
      heightLeft -= 297;

      while (heightLeft > 0) {
        position = heightLeft - imgHeight;
        pdf.addPage();
        pdf.addImage(imgData, "JPEG", 10, position + 10, imgWidth, imgHeight);
        heightLeft -= 297;
      }

      const nome = document.getElementById("report-lead-name").innerText || "cliente";
      pdf.save(`Trackion_${nome}.pdf`);

      btn.innerText = "Gerar PDF";
      btn.disabled = false;
    });
  </script>

</body>
</html>
