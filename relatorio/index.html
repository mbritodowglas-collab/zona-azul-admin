<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <!-- PDF ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #061126;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
    }

    .premium-report-hero {
      padding: 32px 28px 24px;
      color: #fff;
    }

    .premium-report-kicker {
      color: #47b8ff;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .premium-report-meta > div {
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 24px;
    }

    .report-section {
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fff;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 { grid-template-columns: repeat(2, 1fr); }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }

    .report-info-card {
      background: #f5f5f5;
      padding: 14px;
      border-radius: 12px;
    }

    .report-text-block {
      background: #f8f8f8;
      padding: 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .report-chart-wrap {
      height: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
    }

    .parecer-input {
      width: 100%;
      min-height: 180px;
      border: none;
      resize: none;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px;
    }

    .btn {
      background: #47b8ff;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.secondary { background: #333; }

    .report-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* PDF */
    .parecer-render {
      display: none;
      white-space: pre-wrap;
      line-height: 1.7;
      background: #f8f8f8;
      padding: 14px;
      border-radius: 12px;
    }

    body.pdf-capture .no-pdf { display: none !important; }
    body.pdf-capture .parecer-render { display: block !important; }

    /* TRACKION BLOCO FINAL */
    .report-metodo {
      margin-top: 28px;
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
      border: 1px solid rgba(71, 184, 255, 0.18);
    }

    .report-metodo-hero {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #10243d 0%, #173252 100%);
      color: #fff;
      margin-bottom: 18px;
    }

    .report-metodo-hero h3 {
      margin: 0 0 8px;
      font-size: 22px;
      color: #fff;
    }

    .report-metodo-texto {
      background: rgba(255,255,255,0.75);
      padding: 16px;
      border-radius: 16px;
      line-height: 1.7;
    }

    .report-pilares-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .report-pilar-card {
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
    }

    .report-metodo-fechamento {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(71,184,255,0.08);
      border-left: 4px solid #47b8ff;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main class="report-premium-wrap">

    <div class="report-actions">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn" id="print-report-btn">Gerar PDF</button>
    </div>

    <article class="premium-report-card">

      <header class="premium-report-hero">
        <div class="premium-report-kicker">TRACKION SYSTEM</div>
        <h1>SEU PERFIL DE LONGEVIDADE</h1>
        <p>Baseado nas Zonas Azuis.</p>

        <div class="premium-report-meta report-grid cols-2">
          <div><strong id="report-lead-name">...</strong></div>
          <div><strong id="report-date">...</strong></div>
          <div><strong id="report-profissional">Márcio</strong></div>
          <div><strong id="report-cref">CREF</strong></div>
        </div>
      </header>

      <div class="premium-report-body" id="report-body"></div>

    </article>
  </main>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/calculos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=30"></script>

  <script>
    document.getElementById("print-report-btn").addEventListener("click", async () => {
      document.body.classList.add("pdf-capture");

      await document.fonts.ready;
      await new Promise(r => setTimeout(r, 300));

      const { jsPDF } = window.jspdf;
      const element = document.querySelector(".premium-report-card");

      const canvas = await html2canvas(element, { scale: 2 });
      const imgData = canvas.toDataURL("image/jpeg", 1);

      const pdf = new jsPDF("p", "mm", "a4");

      const imgWidth = 190;
      const imgHeight = canvas.height * imgWidth / canvas.width;

      pdf.addImage(imgData, "JPEG", 10, 10, imgWidth, imgHeight);
      pdf.save("Trackion.pdf");

      document.body.classList.remove("pdf-capture");
    });
  </script>

</body>
</html>
