<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <!-- PDF ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #061126;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
    }

    .premium-report-hero {
      padding: 32px 28px 24px;
      color: #fff;
    }

    .premium-report-kicker {
      color: #47b8ff;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .premium-report-hero h1 {
      margin: 10px 0;
    }

    .premium-report-meta > div {
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
    }

    .meta-label {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }

    .premium-report-meta strong {
      color: #fff;
      font-size: 16px;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 24px;
    }

    .report-section {
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fff;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 { grid-template-columns: repeat(2, 1fr); }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }

    .report-info-card {
      background: #f5f5f5;
      padding: 14px;
      border-radius: 12px;
    }

    .report-text-block {
      background: #f8f8f8;
      padding: 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .report-chart-wrap {
      height: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
    }

    .parecer-input {
      width: 100%;
      min-height: 180px;
      border: none;
      resize: none;
      overflow: hidden;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px;
      line-height: 1.7;
    }

    .btn {
      background: #47b8ff;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.secondary {
      background: #333;
    }

    .report-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* 🔥 ESSENCIAL PRO PDF */
    .parecer-render {
      display: none;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 14px;
      color: #334155;
      background: #f8f8f8;
      border-radius: 12px;
      padding: 14px;
      min-height: 180px;
    }

    body.pdf-capture .no-pdf {
      display: none !important;
    }

    body.pdf-capture .parecer-render {
      display: block !important;
    }

    @media (max-width: 720px) {
      .cols-2, .cols-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="report-premium-wrap">

    <div class="report-actions">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn" id="print-report-btn">Gerar PDF</button>
    </div>

    <article class="premium-report-card">

      <header class="premium-report-hero">
        <div class="premium-report-kicker">TRACKION SYSTEM</div>

        <h1>SEU PERFIL DE LONGEVIDADE</h1>

        <p>Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor.</p>

        <div class="premium-report-meta report-grid cols-2">
          <div>
            <span class="meta-label">Cliente</span>
            <strong id="report-lead-name">Carregando...</strong>
          </div>

          <div>
            <span class="meta-label">Data</span>
            <strong id="report-date">--</strong>
          </div>

          <div>
            <span class="meta-label">Responsável</span>
            <strong id="report-profissional">Márcio Dowglas</strong>
          </div>

          <div>
            <span class="meta-label">CREF</span>
            <strong id="report-cref">003918-G/AM</strong>
          </div>
        </div>
      </header>

      <div class="premium-report-body" id="report-body"></div>

    </article>
  </main>

  <!-- SISTEMA -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/calculos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=26"></script>

  <!-- PDF -->
  <script>
    document.getElementById("print-report-btn").addEventListener("click", async () => {

      const btn = document.getElementById("print-report-btn");
      btn.innerText = "Gerando PDF...";
      btn.disabled = true;

      try {
        document.body.classList.add("pdf-capture");

        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 300));

        const { jsPDF } = window.jspdf;
        const element = document.querySelector(".premium-report-card");

        const canvas = await html2canvas(element, {
          scale: 2,
          useCORS: true,
          backgroundColor: "#f3efe6"
        });

        const imgData = canvas.toDataURL("image/jpeg", 1);
        const pdf = new jsPDF("p", "mm", "a4");

        const pageWidth = 210;
        const pageHeight = 297;
        const margin = 10;

        const imgWidth = pageWidth - margin * 2;
        const ratio = canvas.height / canvas.width;
        const imgHeight = imgWidth * ratio;

        let heightLeft = imgHeight;
        let position = 0;

        pdf.addImage(imgData, "JPEG", margin, margin, imgWidth, imgHeight);
        heightLeft -= pageHeight;

        while (heightLeft > 0) {
          position = heightLeft - imgHeight;
          pdf.addPage();
          pdf.addImage(imgData, "JPEG", margin, position + margin, imgWidth, imgHeight);
          heightLeft -= pageHeight;
        }

        const nome = document.getElementById("report-lead-name").innerText || "cliente";
        pdf.save(`Trackion_${nome}.pdf`);

      } catch (err) {
        console.error(err);
        alert("Erro ao gerar PDF");
      } finally {
        document.body.classList.remove("pdf-capture");
        btn.innerText = "Gerar PDF";
        btn.disabled = false;
      }

    });
  </script>

</body>
</html>
