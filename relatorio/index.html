<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <!-- PDF ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #061126;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
    }

    .premium-report-hero {
      padding: 32px 28px 24px;
      color: #fff;
    }

    .premium-report-kicker {
      color: #47b8ff;
      font-weight: 800;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .premium-report-hero h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .premium-report-subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }

    /* 🔥 CORREÇÃO DEFINITIVA DOS QUADROS */
    .premium-report-meta {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .premium-report-meta > div {
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
    }

    .meta-label {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      display: block;
      margin-bottom: 6px;
    }

    .premium-report-meta strong {
      color: #fff;
      font-size: 16px;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 24px;
    }

    .report-section {
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fff;
    }

    .report-section h2 {
      margin-bottom: 12px;
      color: #10243d;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .report-info-card {
      background: #f5f5f5;
      padding: 14px;
      border-radius: 12px;
    }

    .report-chart-wrap {
      height: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
    }

    .report-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn {
      background: #47b8ff;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.secondary {
      background: #333;
    }

    .parecer-input {
      width: 100%;
      min-height: 180px;
      border: none;
      outline: none;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px;
    }

    @media (max-width: 720px) {
      .cols-2,
      .cols-3 {
        grid-template-columns: 1fr;
      }

      .report-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <main class="report-premium-wrap">

    <div class="report-actions">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn" id="print-report-btn">Gerar PDF</button>
    </div>

    <article class="premium-report-card">

      <!-- CAPA -->
      <header class="premium-report-hero">

        <div class="premium-report-kicker">TRACKION SYSTEM</div>

        <h1>SEU PERFIL DE LONGEVIDADE</h1>

        <p class="premium-report-subtitle">
          Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor.
        </p>

        <div class="premium-report-meta">

          <div>
            <span class="meta-label">Cliente</span>
            <strong id="report-lead-name">Carregando...</strong>
          </div>

          <div>
            <span class="meta-label">Data</span>
            <strong id="report-date">--</strong>
          </div>

          <div>
            <span class="meta-label">Responsável técnico</span>
            <strong id="report-profissional">--</strong>
          </div>

          <div>
            <span class="meta-label">CREF</span>
            <strong id="report-cref">--</strong>
          </div>

        </div>

      </header>

      <!-- CONTEÚDO DINÂMICO -->
      <div class="premium-report-body" id="report-body"></div>

    </article>

  </main>

  <!-- DEPENDÊNCIAS -->
  <script src="../assets/js/supabase.js?v=1"></script>
  <script src="../assets/js/storage.js?v=1"></script>
  <script src="../assets/js/calculos.js?v=18"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- SCRIPT PRINCIPAL -->
  <script src="../assets/js/relatorio.js?v=MANUAL_PDF_V1"></script>

</body>
</html>
