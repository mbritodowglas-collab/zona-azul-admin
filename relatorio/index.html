<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <!-- PDF ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #061126;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #10243d;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
    }

    .premium-report-hero {
      padding: 32px 28px 24px;
      color: #fff;
    }

    .premium-report-hero h1 {
      margin: 10px 0;
      color: #ffffff;
      line-height: 1.08;
    }

    .premium-report-hero p {
      margin: 0;
      color: rgba(255,255,255,0.9);
      line-height: 1.7;
    }

    .premium-report-kicker {
      color: #47b8ff;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .premium-report-meta > div {
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
    }

    .meta-label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.35;
    }

    .premium-report-meta strong {
      color: #fff;
      font-size: 16px;
      line-height: 1.35;
      display: block;
      font-weight: 800;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 24px;
    }

    .report-section {
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fffaf2;
      box-shadow: 0 8px 24px rgba(16,24,40,0.06);
    }

    .report-section h2 {
      margin: 0 0 14px;
      color: #10243d;
      font-size: 22px;
      line-height: 1.2;
    }

    .report-section h3 {
      margin: 0 0 8px;
      color: #10243d;
      font-size: 16px;
      line-height: 1.3;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .report-info-card {
      background: #f5f5f5;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(16,24,40,0.06);
    }

    .report-info-card span {
      display: block;
      margin-bottom: 8px;
      color: #6b7280;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.35;
    }

    .report-info-card strong {
      display: block;
      color: #10243d;
      line-height: 1.4;
      font-weight: 700;
    }

    .report-text-block {
      background: #f8f8f8;
      padding: 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.7;
      color: #334155;
      border: 1px solid rgba(16,24,40,0.05);
    }

    .report-text-block p,
    .report-mini-text {
      margin: 0;
      color: #334155;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .report-mini-text {
      margin-top: 8px;
    }

    .report-chart-wrap {
      height: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(16,24,40,0.06);
    }

    .parecer-input {
      width: 100%;
      min-height: 180px;
      border: none;
      resize: none;
      overflow: hidden;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px;
      line-height: 1.7;
      color: #10243d;
      font: inherit;
      box-sizing: border-box;
    }

    .parecer-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      background: #47b8ff;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      box-shadow: 0 10px 20px rgba(71,184,255,0.22);
    }

    .btn.secondary {
      background: #333;
      box-shadow: none;
    }

    .report-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    /* ===== PDF ===== */
    .parecer-render {
      display: none;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 14px;
      color: #334155 !important;
      background: #f8f8f8 !important;
      border-radius: 12px;
      padding: 14px;
      min-height: 180px;
      border: 1px solid rgba(16,24,40,0.05);
    }

    body.pdf-capture .no-pdf {
      display: none !important;
    }

    body.pdf-capture .parecer-render {
      display: block !important;
    }

    /* ===== BLOCO FINAL TRACKION ===== */
    .report-metodo {
      margin-top: 8px;
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
      border: 1px solid rgba(71,184,255,0.18);
      box-shadow: 0 12px 30px rgba(16,36,61,0.08);
    }

    .report-metodo-hero {
      padding: 18px 18px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #10243d 0%, #173252 100%);
      color: #fff !important;
      margin-bottom: 18px;
    }

    .report-metodo-kicker {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6fd3ff !important;
      line-height: 1.35;
    }

    .report-metodo-hero h3 {
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.15;
      color: #ffffff !important;
      font-weight: 800;
      text-shadow: 0 1px 1px rgba(0,0,0,0.18);
    }

    .report-metodo-hero p {
      margin: 0;
      color: rgba(255,255,255,0.96) !important;
      line-height: 1.75;
      font-size: 15px;
    }

    .report-metodo-texto {
      background: rgba(255,255,255,0.86);
      border-radius: 16px;
      padding: 16px;
      color: #334155 !important;
      line-height: 1.8;
      border: 1px solid rgba(16,24,40,0.04);
    }

    .report-metodo-texto p {
      margin: 0 0 14px;
      color: #334155 !important;
      font-size: 15px;
      line-height: 1.8;
    }

    .report-metodo-texto p:last-child {
      margin-bottom: 0;
    }

    .report-pilares-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .report-pilar-card {
      background: #ffffff;
      border: 1px solid rgba(16,36,61,0.08);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(16,24,40,0.05);
    }

    .report-pilar-card h4 {
      margin: 0 0 8px;
      color: #10243d !important;
      font-size: 15px;
      line-height: 1.3;
    }

    .report-pilar-card p {
      margin: 0;
      color: #475569 !important;
      font-size: 14px;
      line-height: 1.7;
    }

    .report-metodo-fechamento {
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(71,184,255,0.10);
      border-left: 5px solid #47b8ff;
      color: #10243d !important;
      font-weight: 700;
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      .cols-2,
      .cols-3,
      .report-pilares-grid {
        grid-template-columns: 1fr;
      }

      .report-actions {
        flex-direction: column;
      }

      .report-actions > * {
        width: 100%;
      }

      .report-metodo-hero h3 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="report-premium-wrap">

    <div class="report-actions">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn" id="print-report-btn">Gerar PDF</button>
    </div>

    <article class="premium-report-card">

      <header class="premium-report-hero">
        <div class="premium-report-kicker">TRACKION SYSTEM</div>

        <h1>SEU PERFIL DE LONGEVIDADE</h1>

        <p>Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor.</p>

        <div class="premium-report-meta report-grid cols-2">
          <div>
            <span class="meta-label">Cliente</span>
            <strong id="report-lead-name">Carregando...</strong>
          </div>

          <div>
            <span class="meta-label">Data</span>
            <strong id="report-date">--</strong>
          </div>

          <div>
            <span class="meta-label">Responsável</span>
            <strong id="report-profissional">Márcio Dowglas</strong>
          </div>

          <div>
            <span class="meta-label">CREF</span>
            <strong id="report-cref">003918-G/AM</strong>
          </div>
        </div>
      </header>

      <div class="premium-report-body" id="report-body"></div>

    </article>
  </main>

  <!-- SISTEMA -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/calculos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=30"></script>

  <!-- PDF -->
  <script>
    document.getElementById("print-report-btn").addEventListener("click", async () => {
      const btn = document.getElementById("print-report-btn");
      const originalText = btn.innerText;

      btn.innerText = "Gerando PDF...";
      btn.disabled = true;

      try {
        document.body.classList.add("pdf-capture");

        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 300));

        const { jsPDF } = window.jspdf;
        const element = document.querySelector(".premium-report-card");

        const canvas = await html2canvas(element, {
          scale: 2,
          useCORS: true,
          backgroundColor: "#f3efe6"
        });

        const imgData = canvas.toDataURL("image/jpeg", 1);
        const pdf = new jsPDF("p", "mm", "a4");

        const pageWidth = 210;
        const pageHeight = 297;
        const margin = 10;

        const imgWidth = pageWidth - margin * 2;
        const ratio = canvas.height / canvas.width;
        const imgHeight = imgWidth * ratio;

        let heightLeft = imgHeight;
        let position = 0;

        pdf.addImage(imgData, "JPEG", margin, margin, imgWidth, imgHeight);
        heightLeft -= pageHeight;

        while (heightLeft > 0) {
          position = heightLeft - imgHeight;
          pdf.addPage();
          pdf.addImage(imgData, "JPEG", margin, position + margin, imgWidth, imgHeight);
          heightLeft -= pageHeight;
        }

        const nome = document.getElementById("report-lead-name").innerText || "cliente";
        const nomeSeguro = nome
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\w\s-]/g, "")
          .trim()
          .replace(/\s+/g, "_");

        pdf.save(`Trackion_${nomeSeguro}.pdf`);
      } catch (err) {
        console.error(err);
        alert("Erro ao gerar PDF");
      } finally {
        document.body.classList.remove("pdf-capture");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
