<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>
  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <style>
    .report-premium-shell {
      background: #061126 !important;
      color: #f3f8ff !important;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%) !important;
      color: #f3f8ff !important;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .premium-report-hero {
      background:
        radial-gradient(circle at top right, rgba(71,184,255,0.10), transparent 28%),
        linear-gradient(180deg, #0d2342 0%, #061126 100%) !important;
      color: #f3f8ff !important;
      padding: 32px 28px 24px;
    }

    .premium-report-kicker {
      color: #47b8ff !important;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .premium-report-hero h1 {
      color: #ffffff !important;
      margin: 14px 0 10px;
      line-height: 1.05;
      font-size: clamp(2rem, 5vw, 3.2rem);
    }

    .premium-report-subtitle {
      color: rgba(235, 243, 255, 0.88) !important;
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0;
    }

    .premium-report-meta {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .premium-report-meta > div {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
    }

    .premium-report-meta .meta-label {
      display: block;
      color: rgba(235,243,255,0.7) !important;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .premium-report-meta strong {
      color: #ffffff !important;
      font-size: 18px;
    }

    .premium-report-body {
      background: #f3efe6 !important;
      padding: 24px;
      border-top: 6px solid #47b8ff;
    }

    .report-section {
      margin-top: 22px;
      padding: 22px;
      border-radius: 22px;
      background: #fffaf2 !important;
      border: 1px solid rgba(16, 24, 40, 0.08) !important;
      box-shadow: 0 8px 22px rgba(16, 24, 40, 0.06);
    }

    .report-section h2 {
      margin: 0 0 14px;
      font-size: 28px;
      color: #10243d !important;
    }

    .report-section h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #173252 !important;
    }

    .report-grid {
      display: grid;
      gap: 14px;
    }

    .report-grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0,1fr));
    }

    .report-grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0,1fr));
    }

    .report-info-card,
    .report-highlight-card,
    .report-text-block {
      padding: 16px;
      border-radius: 18px;
      background: #ffffff !important;
      border: 1px solid rgba(16, 24, 40, 0.08) !important;
    }

    .report-info-card span,
    .report-highlight-card span {
      display: block;
      margin-bottom: 8px;
      color: #6b7280 !important;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .report-info-card strong,
    .report-highlight-card strong {
      color: #10243d !important;
      font-size: 20px;
      line-height: 1.3;
    }

    .report-text-block p,
    .report-mini-text {
      margin: 0;
      color: #334155 !important;
      line-height: 1.7;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .report-mini-text {
      margin-top: 10px;
    }

    .report-chart-wrap {
      height: 360px;
      margin-top: 16px;
      background: #ffffff;
      border-radius: 18px;
      padding: 12px;
      border: 1px solid rgba(16,24,40,0.08);
      position: relative;
    }

    .report-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .report-actions .btn,
    .report-actions .btn.secondary,
    .parecer-actions .btn {
      color: #fff !important;
      text-decoration: none;
      border: none;
      border-radius: 16px;
      min-height: 48px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      cursor: pointer;
    }

    .report-actions .btn.secondary {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .report-actions .btn:not(.secondary),
    .parecer-actions .btn {
      background: linear-gradient(135deg, #47b8ff, #1f7cff);
      box-shadow: 0 12px 26px rgba(71,184,255,0.25);
    }

    .parecer-input {
      width: 100%;
      min-height: 220px;
      border: none;
      outline: none;
      resize: vertical;
      background: transparent;
      color: #334155;
      font: inherit;
      line-height: 1.7;
    }

    .parecer-actions {
      margin-top: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      .premium-report-meta,
      .report-grid.cols-2,
      .report-grid.cols-3 {
        grid-template-columns: 1fr;
      }

      .premium-report-hero {
        padding: 24px 20px 20px;
      }

      .premium-report-body {
        padding: 18px;
      }

      .report-section h2 {
        font-size: 24px;
      }

      .report-actions,
      .parecer-actions {
        flex-direction: column;
      }

      .report-actions > *,
      .parecer-actions > * {
        width: 100%;
      }
    }

    @media print {
      body,
      .report-premium-shell {
        background: #ffffff !important;
        color: #111827 !important;
      }

      .report-actions,
      .no-print {
        display: none !important;
      }

      .premium-report-card,
      .premium-report-hero,
      .premium-report-body,
      .report-section,
      .report-info-card,
      .report-highlight-card,
      .report-text-block,
      .premium-report-meta > div,
      .report-chart-wrap {
        background: #ffffff !important;
        color: #111827 !important;
        box-shadow: none !important;
        border-color: #d1d5db !important;
      }

      .premium-report-kicker,
      .meta-label,
      .report-info-card span,
      .report-highlight-card span {
        color: #6b7280 !important;
      }

      .premium-report-hero h1,
      .report-section h2,
      .report-section h3,
      .report-info-card strong,
      .report-highlight-card strong,
      .report-text-block p,
      .report-mini-text,
      .premium-report-subtitle,
      .premium-report-meta strong {
        color: #111827 !important;
      }
    }
  </style>
</head>
<body class="report-shell report-premium-shell">
  <main class="report-wrap report-premium-wrap">
    <div class="report-actions no-print">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn" id="print-report-btn" type="button">Baixar / Imprimir PDF</button>
    </div>

    <article class="report-card premium-report-card" id="report-content">
      <header class="premium-report-hero">
        <div class="premium-report-kicker">◆ TRACKION SYSTEM ◆</div>
        <h1>SEU PERFIL DE LONGEVIDADE</h1>
        <p class="premium-report-subtitle">
          Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor — aplicado de forma prática pelo Trackion System.
        </p>

        <div class="premium-report-meta">
          <div>
            <span class="meta-label">Lead</span>
            <strong id="report-lead-name">Carregando...</strong>
          </div>
          <div>
            <span class="meta-label">Relatório gerado em</span>
            <strong id="report-date">--/--/----</strong>
          </div>
          <div>
            <span class="meta-label">Responsável técnico</span>
            <strong id="report-profissional">Carregando...</strong>
          </div>
          <div>
            <span class="meta-label">CREF</span>
            <strong id="report-cref">—</strong>
          </div>
        </div>
      </header>

      <div class="report-body premium-report-body" id="report-body"></div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js?v=1"></script>
  <script src="../assets/js/storage.js?v=1"></script>
  <script src="../assets/js/calculos.js?v=18"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=21"></script>
</body>
</html>
