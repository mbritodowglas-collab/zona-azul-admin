<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=60" />

  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #061126 0%, #020816 100%);
      color: #f3f8ff;
      font-family: Arial, sans-serif;
    }

    .report-wrap {
      max-width: 1000px;
      margin: auto;
      padding: 24px;
    }

    .hero {
      background: rgba(10,24,48,0.85);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 60px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
    }

    .brand-sub {
      font-size: 12px;
      color: #47b8ff;
      font-weight: bold;
    }

    .subtitle {
      margin-top: 10px;
      color: #9cb0cb;
      font-size: 14px;
      line-height: 1.6;
    }

    .meta {
      margin-top: 20px;
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .section {
      margin-top: 24px;
      background: rgba(10,24,48,0.7);
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="report-wrap">

    <div class="hero">
      <div class="brand">
        <img src="../assets/img/trackion-logo.png" />
        <div>
          <h1>Trackion System</h1>
          <div class="brand-sub">CORPO • MENTE • PERFORMANCE</div>
        </div>
      </div>

      <p class="subtitle">
        Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor —
        aplicado de forma prática pelo Trackion System.
      </p>

      <div class="meta">
        <div><strong>Cliente:</strong> <span id="cliente-nome">—</span></div>
        <div><strong>Objetivo:</strong> <span id="cliente-objetivo">—</span></div>
        <div><strong>Fase:</strong> <span id="cliente-fase">—</span></div>

        <div><strong>Responsável:</strong> <span id="profissional-nome"></span></div>
        <div><strong>CREF:</strong> <span id="profissional-cref"></span></div>
      </div>
    </div>

    <div class="section">
      <h2>Radar de Avaliação</h2>
      <canvas id="radarChart"></canvas>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=4"></script>
</body>
</html>
