<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório | Trackion System</title>

  <link rel="stylesheet" href="../assets/css/global.css?v=18" />

  <!-- PDF ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #061126;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .report-premium-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .premium-report-card {
      background: linear-gradient(180deg, #0d2342 0%, #061126 100%);
      border-radius: 28px;
      overflow: hidden;
    }

    .premium-report-hero {
      padding: 32px 28px 24px;
      color: #fff;
    }

    .premium-report-kicker {
      color: #47b8ff;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .premium-report-hero h1 {
      margin: 10px 0;
      line-height: 1.05;
    }

    .premium-report-hero p {
      margin: 0;
      line-height: 1.7;
      color: rgba(255,255,255,0.86);
    }

    /* 🔥 CORREÇÃO DO PROBLEMA DOS QUADROS APAGADOS */
    .premium-report-meta > div {
      background: rgba(255,255,255,0.15);
      backdrop-filter: none;
      border-radius: 14px;
      padding: 14px;
    }

    .meta-label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.35;
    }

    .premium-report-meta strong {
      color: #fff;
      font-size: 16px;
      line-height: 1.35;
      display: block;
      font-weight: 800;
    }

    .premium-report-body {
      background: #f3efe6;
      padding: 24px;
    }

    .report-section {
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fff;
    }

    .report-section:first-child {
      margin-top: 0;
    }

    .report-section h2 {
      margin: 0 0 14px;
      color: #10243d;
    }

    .report-section h3 {
      margin: 0 0 8px;
      color: #10243d;
    }

    .report-grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .report-info-card {
      background: #f5f5f5;
      padding: 14px;
      border-radius: 12px;
    }

    .report-info-card span {
      display: block;
      margin-bottom: 8px;
      color: #6b7280;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.35;
    }

    .report-info-card strong {
      display: block;
      color: #10243d;
      line-height: 1.4;
    }

    .report-text-block {
      background: #f8f8f8;
      padding: 14px;
      border-radius: 12px;
    }

    .report-text-block p,
    .report-mini-text {
      margin: 0;
      color: #334155;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .report-mini-text {
      margin-top: 8px;
    }

    .report-chart-wrap {
      height: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
    }

    .parecer-input {
      width: 100%;
      min-height: 180px;
      border: none;
      outline: none;
      resize: vertical;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      line-height: 1.7;
      color: #10243d;
    }

    .parecer-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .report-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .btn {
      background: #47b8ff;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }

    .btn.secondary {
      background: #333;
    }

    @media (max-width: 720px) {
      .premium-report-meta,
      .cols-2,
      .cols-3 {
        grid-template-columns: 1fr;
      }

      .report-actions {
        flex-direction: column;
      }

      .report-actions > * {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="report-premium-wrap">

    <div class="report-actions">
      <a href="../pre-diagnostico/" class="btn secondary">Voltar</a>
      <button class="btn" id="print-report-btn">Gerar PDF</button>
    </div>

    <article class="premium-report-card">

      <header class="premium-report-hero">
        <div class="premium-report-kicker">TRACKION SYSTEM</div>

        <h1>SEU PERFIL DE LONGEVIDADE</h1>

        <p>
          Baseado nas Zonas Azuis — regiões onde as pessoas vivem mais e melhor.
        </p>

        <div class="premium-report-meta report-grid cols-2">

          <div>
            <span class="meta-label">Cliente</span>
            <strong id="report-lead-name">Carregando...</strong>
          </div>

          <div>
            <span class="meta-label">Data</span>
            <strong id="report-date">--</strong>
          </div>

          <div>
            <span class="meta-label">Responsável</span>
            <strong id="report-profissional">Márcio Dowglas</strong>
          </div>

          <div>
            <span class="meta-label">CREF</span>
            <strong id="report-cref">003918-G/AM</strong>
          </div>

        </div>
      </header>

      <div class="premium-report-body" id="report-body"></div>

    </article>
  </main>

  <!-- SISTEMA -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/calculos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../assets/js/relatorio.js?v=25"></script>

  <!-- 🚀 PDF ENGINE -->
  <script>
    document.getElementById("print-report-btn").addEventListener("click", async () => {
      const btn = document.getElementById("print-report-btn");
      const originalText = btn.innerText;

      btn.innerText = "Gerando PDF...";
      btn.disabled = true;

      try {
        const { jsPDF } = window.jspdf;
        const element = document.querySelector(".premium-report-card");

        if (document.fonts?.ready) {
          await document.fonts.ready;
        }

        await new Promise(r => setTimeout(r, 300));

        const canvas = await html2canvas(element, {
          scale: 2,
          useCORS: true,
          backgroundColor: "#f3efe6"
        });

        const imgData = canvas.toDataURL("image/jpeg", 1);

        const pdf = new jsPDF("p", "mm", "a4");

        const pageWidth = 210;
        const pageHeight = 297;
        const margin = 10;

        const imgWidth = pageWidth - margin * 2;
        const ratio = canvas.height / canvas.width;
        const imgHeight = imgWidth * ratio;

        let heightLeft = imgHeight;
        let position = 0;

        pdf.addImage(imgData, "JPEG", margin, position + margin, imgWidth, imgHeight);
        heightLeft -= pageHeight;

        while (heightLeft > 0) {
          position = heightLeft - imgHeight;
          pdf.addPage();
          pdf.addImage(imgData, "JPEG", margin, position + margin, imgWidth, imgHeight);
          heightLeft -= pageHeight;
        }

        const nome = document.getElementById("report-lead-name").innerText || "cliente";
        const nomeSeguro = nome
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\w\s-]/g, "")
          .trim()
          .replace(/\s+/g, "_");

        pdf.save(`Trackion_${nomeSeguro}.pdf`);
      } catch (err) {
        console.error("Erro ao gerar PDF:", err);
        alert("Erro ao gerar o PDF. Tente novamente.");
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
