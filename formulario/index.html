<div class="form-step" data-step="1">
  <div class="field">
    <label for="nome">Nome completo</label>
    <input type="text" id="nome" required />
  </div>

  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" required />
  </div>

  <div class="field">
    <label>Data de nascimento</label>
    <div style="display:flex; gap:8px;">
      <input type="number" id="nascimento_dia" placeholder="Dia" required />
      <input type="number" id="nascimento_mes" placeholder="Mês" required />
      <input type="number" id="nascimento_ano" placeholder="Ano" required />
    </div>
  </div>

  <div class="field">
    <label for="genero">Gênero</label>
    <select id="genero" required>
      <option value="">Selecione</option>
      <option value="masculino">Masculino</option>
      <option value="feminino">Feminino</option>
      <option value="nao_informar">Prefiro não informar</option>
    </select>
  </div>

  <div class="field">
    <label for="cidade">Cidade</label>
    <input type="text" id="cidade" required />
  </div>

  <div class="field">
    <label for="origem">Como nos conheceu?</label>
    <input type="text" id="origem" required />
  </div>
</div>
