<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads | Zona Azul Admin</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">ZA</div>
        <div>
          <h1>Zona Azul Admin</h1>
          <p>Painel operacional</p>
        </div>
      </div>

      <nav class="nav">
        <a href="../index.html">Dashboard</a>
        <a class="active" href="./index.html">Leads</a>
        <a href="../pre-diagnostico/">Pré-diagnóstico</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2>Leads</h2>
          <p>Captados automaticamente pelo pré-diagnóstico.</p>
        </div>
        <div class="actions">
          <button class="btn secondary" id="clear-leads-btn">Limpar leads locais</button>
        </div>
      </div>

      <section class="card">
        <div class="card-header">
          <h3>Lista de leads</h3>
        </div>
        <div class="card-body">
          <div id="empty-state" class="empty-state hidden">
            Nenhum lead respondeu o pré-diagnóstico ainda.
          </div>

          <div class="table-wrap" id="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Email</th>
                  <th>Origem</th>
                  <th>Pilar mais baixo</th>
                  <th>Média</th>
                  <th>Status</th>
                  <th>Preenchido em</th>
                </tr>
              </thead>
              <tbody id="leads-table-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/calculos.js"></script>
  <script src="../assets/js/leads.js"></script>
</body>
</html>
